<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOXX4E</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root {
  --metal-bar: linear-gradient(90deg, #f0a0bc 0%, #f5b0c8 20%, #f8c0d4 40%, #f5b0c8 60%, #ffffff 75%, #f5b0c8 85%, #f0a0bc 100%);
  --hover-metal: linear-gradient(90deg, #fad4e4 0%, #fde0ec 40%, #fde8f2 60%, #ffffff 75%, #fde0ec 85%, #fad4e4 100%);
  --rg: #d4607a;
  --rg2: #b5405e;
  --rg3: #e8829a;
  --text: #3d1a24;
  --text2: #8a4a5a;
  --border: rgba(212,96,122,0.18);
  --white: #fff8fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Pretendard',sans-serif;background:#fce8ef;background-image:radial-gradient(ellipse at 15% 10%,rgba(255,182,210,0.4) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(232,130,154,0.2) 0%,transparent 45%);}
.site-wrap{display:flex;min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{width:180px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{
  padding:9px 16px;min-height:90px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  background:var(--hover-metal);
  border-bottom:1px solid var(--border);
  transition:box-shadow 0.25s, filter 0.25s;
}
.sidebar-logo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  pointer-events:none;
}
.sidebar-logo:hover{ filter:brightness(1.04); box-shadow:0 3px 14px rgba(212,96,122,0.18); }

/* ✦ 메인 활성 상태 */
.sidebar-logo.logo-active{
  background:var(--metal-bar);
  box-shadow:0 4px 20px rgba(212,96,122,0.32), inset 0 1px 0 rgba(255,255,255,0.5);
}
.sidebar-logo.logo-active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;
  background:linear-gradient(180deg,#e8829a,#d4607a);
  border-radius:0 3px 3px 0;
}
.sidebar-logo.logo-active img{
  filter:drop-shadow(0 2px 8px rgba(212,96,122,0.45));
  transform:scale(1.04);
  transition:transform 0.25s, filter 0.25s;
}
.sidebar-logo.logo-active .logo-active-badge{display:flex;}
.logo-active-badge{
  display:none;
  align-items:center;gap:4px;
  margin-top:5px;
  padding:2px 9px;
  border-radius:10px;
  background:linear-gradient(90deg,rgba(212,96,122,0.18),rgba(232,130,154,0.1));
  border:1px solid rgba(212,96,122,0.25);
  font-size:0.5rem;font-weight:800;letter-spacing:0.18em;
  color:var(--rg);font-family:'Pretendard',sans-serif;
  text-transform:uppercase;
}
.logo-active-badge::before{content:'✦';font-size:0.45rem;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--rg2);letter-spacing:0.08em;line-height:1;}
.logo-sub{font-size:0.58rem;letter-spacing:0.28em;color:var(--text2);margin-top:3px;text-transform:uppercase;font-family:'Pretendard',sans-serif;font-weight:700;}
.nav-group-label{font-size:0.57rem;letter-spacing:0.26em;color:var(--rg3);text-transform:uppercase;padding:12px 16px 3px;font-weight:800;font-family:'Pretendard',sans-serif;}
.nav-item{display:block;padding:10px 16px 10px 22px;font-size:0.77rem;color:var(--text2);text-decoration:none;letter-spacing:0.04em;transition:all 0.3s ease;border-left:3px solid transparent;cursor:pointer;margin:1px 0;}
.nav-item:hover,.btn-add-menu:hover{color:var(--rg2);background:var(--hover-metal);border-left-color:var(--rg);font-weight:500;}
.nav-item.active{color:var(--rg2);background:var(--hover-metal);border-left-color:var(--rg);font-weight:700;}

/* ─── BGM ─── */
.bgm-widget{position:fixed;bottom:24px;right:28px;z-index:150;width:220px;border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--white);box-shadow:0 6px 28px rgba(212,96,122,0.22);user-select:none;}
.bgm-header{background:var(--metal-bar);padding:7px 11px;display:flex;align-items:center;justify-content:space-between;cursor:grab;}
.bgm-header:active{cursor:grabbing;}
.bgm-header-title{font-family:'Cormorant Garamond',serif;font-size:0.72rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.bgm-dots{display:flex;gap:4px;}
.bgm-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.bgm-body{padding:14px 14px 18px;}
.record-scene{position:relative;width:100px;height:100px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
.record-disc{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,#2a0c18 0% 11%,transparent 11%),radial-gradient(circle,#1e0810 0% 13%,transparent 13%),radial-gradient(circle,#2a0c18 0% 22%,transparent 22%),radial-gradient(circle,#1e0810 0% 24%,transparent 24%),radial-gradient(circle,#2a0c18 0% 38%,transparent 38%),radial-gradient(circle,#1e0810 0% 40%,transparent 40%),conic-gradient(from 0deg,#180810 0deg,#22101a 9deg,#180810 18deg,#22101a 27deg,#180810 36deg,#22101a 45deg,#180810 54deg,#22101a 63deg,#180810 72deg,#22101a 81deg,#180810 90deg,#22101a 99deg,#180810 108deg,#22101a 117deg,#180810 126deg,#22101a 135deg,#180810 144deg,#22101a 153deg,#180810 162deg,#22101a 171deg,#180810 180deg,#22101a 189deg,#180810 198deg,#22101a 207deg,#180810 216deg,#22101a 225deg,#180810 234deg,#22101a 243deg,#180810 252deg,#22101a 261deg,#180810 270deg,#22101a 279deg,#180810 288deg,#22101a 297deg,#180810 306deg,#22101a 315deg,#180810 324deg,#22101a 333deg,#180810 342deg,#22101a 351deg,#180810 360deg);box-shadow:0 0 0 2px #3a1020,0 5px 18px rgba(0,0,0,0.45);position:relative;flex-shrink:0;}
.record-disc.spinning{animation:vinylSpin 2.8s linear infinite;}
@keyframes vinylSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.record-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:var(--metal-bar);box-shadow:0 0 0 1.5px rgba(200,80,120,0.5);z-index:2;overflow:hidden;}
.record-label-thumb{width:100%;height:100%;border-radius:50%;object-fit:cover;display:none;opacity:0.88;}
.record-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#180810;z-index:5;}
.bgm-info{text-align:center;margin-bottom:10px;}
.bgm-track-title{font-size:0.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.bgm-track-channel{font-size:0.6rem;color:var(--text2);}
.bgm-controls{display:flex;justify-content:center;gap:8px;align-items:center;}
.bgm-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--white);color:var(--rg2);font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s;line-height:1;padding:0;flex-shrink:0;}
.bgm-btn.play-btn{width:34px;height:34px;font-size:0.95rem;background:var(--rg);color:white;border:none;box-shadow:0 2px 8px rgba(212,96,122,0.3);}

/* ─── MAIN ─── */
.main{flex:1;padding:0;overflow-y:auto;display:flex;flex-direction:column;}
.main-header{padding:16px 30px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(212,96,122,0.07);min-height:90px;}
.main-header-left{display:flex;flex-direction:column;justify-content:center;}
.main-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--rg2);letter-spacing:0.06em;line-height:1;margin-bottom:3px;}
.main-date{font-size:0.58rem;color:var(--text2);letter-spacing:0.22em;text-transform:uppercase;font-weight:700;}
.header-write-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border:none;border-radius:24px;background:var(--metal-bar);color:#6a2038;font-weight:800;font-size:0.75rem;cursor:pointer;box-shadow:0 3px 12px rgba(212,96,122,0.28);transition:opacity 0.2s,transform 0.15s;letter-spacing:0.08em;font-family:'Pretendard',sans-serif;white-space:nowrap;flex-shrink:0;}
.header-write-btn:hover{opacity:0.88;transform:translateY(-1px);}
.header-write-btn.hidden{display:none;}

/* ─── WIDGETS ─── */
.widget{background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(212,96,122,0.08);overflow:hidden;animation:fadeUp .6s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.widget-header{background:var(--metal-bar);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.widget-header-title{font-family:'Cormorant Garamond',serif;font-size:0.76rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.w-dots{display:flex;gap:5px;}
.w-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.widget-body{padding:18px 18px 25px;}

/* ─── HOME WIDGET AREA (draggable) ─── */
.home-widget-area{position:relative;flex:1;min-height:700px;padding:20px;}
.draggable-widget{position:absolute;background:var(--white);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(212,96,122,0.08);overflow:hidden;display:flex;flex-direction:column;animation:fadeUp .4s ease both;min-width:200px;min-height:80px;z-index:10;}
.draggable-widget:hover{z-index:20;}
.draggable-widget.dragging{z-index:50;box-shadow:0 12px 40px rgba(212,96,122,0.28);opacity:0.95;}
.draggable-widget .widget-header{cursor:grab;user-select:none;flex-shrink:0;}
.draggable-widget .widget-header:active{cursor:grabbing;}
.draggable-widget .widget-body{flex:1;overflow-y:auto;min-height:0;}
#w-image .widget-body{overflow:hidden;}
.hw-resize-s{position:absolute;bottom:0;left:0;right:16px;height:6px;cursor:s-resize;z-index:4;}
.hw-resize-e{position:absolute;top:0;right:0;bottom:16px;width:6px;cursor:e-resize;z-index:4;}
.hw-resize-se{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:se-resize;z-index:5;}

/* ─── SETTINGS ─── */
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#fffcfd;padding:8px 10px;border-radius:8px;border:1px solid var(--border);transition:background 0.15s,box-shadow 0.15s;}
.setting-row.drag-over{background:rgba(212,96,122,0.08);border-color:var(--rg3);box-shadow:0 0 0 2px rgba(212,96,122,0.18);}
.setting-row.dragging-row{opacity:0.45;}
.drag-handle{cursor:grab;color:var(--rg3);font-size:0.85rem;padding:0 2px;flex-shrink:0;user-select:none;line-height:1;}
.drag-handle:active{cursor:grabbing;}
.group-input{width:45px;border:none;background:rgba(212,96,122,0.05);font-size:0.55rem;color:var(--rg3);font-weight:800;text-transform:uppercase;text-align:center;border-radius:4px;padding:2px 0;outline:none;}
.group-input:focus{background:var(--hover-metal);}
.menu-name-input{flex:1;border:none;background:transparent;font-size:0.75rem;outline:none;color:var(--text);font-weight:500;}
.btn-del{background:none;border:none;color:#e8829a;cursor:pointer;font-size:0.85rem;padding:0 5px;opacity:0.6;transition:opacity 0.2s;}
.btn-del:hover{opacity:1;}
.btn-add-menu{width:100%;padding:10px;border:1px dashed var(--rg3);border-radius:8px;background:none;color:var(--rg2);font-size:0.7rem;font-weight:700;cursor:pointer;margin:15px 0;transition:background 0.2s;}
.save-btn{padding:8px 18px;border:none;border-radius:20px;background:var(--rg);color:white;font-weight:700;font-size:0.7rem;cursor:pointer;margin-top:10px;float:right;box-shadow:0 2px 6px rgba(212,96,122,0.25);}

/* ─── UI Elements ─── */
.memo-area{width:100%;height:120px;padding:12px;border:1px solid var(--border);border-radius:10px;background:#fff8fb;resize:none;outline:none;font-size:0.8rem;font-family:inherit;color:var(--text);}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:var(--rg2);line-height:1;margin-bottom:14px;letter-spacing:0.08em;}
.tag-item{padding:9px 12px;border-radius:8px;background:rgba(252,232,239,0.8);border-left:3px solid var(--rg3);font-size:0.8rem;font-weight:800;color:var(--rg2);margin-bottom:7px;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:space-between;}
.tag-item-text{flex:1;}
.tag-del-btn{background:none;border:none;color:var(--rg3);cursor:pointer;font-size:0.75rem;opacity:0.5;padding:0 2px;transition:opacity .2s;}
.tag-del-btn:hover{opacity:1;}
.tag-add-row{display:flex;gap:6px;margin-top:8px;}
.tag-add-input{flex:1;border:1px dashed var(--rg3);border-radius:8px;background:transparent;padding:7px 10px;font-size:0.75rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;font-weight:600;}
.tag-add-input::placeholder{color:var(--rg3);}
.tag-add-btn{padding:7px 14px;border:none;border-radius:8px;background:var(--metal-bar);color:#6a2038;font-weight:800;font-size:0.72rem;cursor:pointer;}

/* ─── CHECKLIST ─── */
.checklist-wrap{display:flex;flex-direction:column;gap:6px;}
.checklist-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:rgba(252,232,239,0.5);border:1px solid var(--border);}
.checklist-check{width:15px;height:15px;flex-shrink:0;cursor:pointer;border-radius:5px;border:1.5px solid var(--rg3);background:#fff8fb;position:relative;transition:background 0.15s,border-color 0.15s;display:flex;align-items:center;justify-content:center;}
.checklist-check.checked{background:rgba(212,96,122,0.12);border-color:var(--rg);}
.checklist-check.checked::after{content:'';display:block;width:4px;height:7px;border-right:2px solid var(--rg2);border-bottom:2px solid var(--rg2);transform:rotate(40deg) translate(-1px,-1px);}
.checklist-item-text{flex:1;font-size:0.78rem;font-weight:600;color:var(--text);font-family:'Pretendard',sans-serif;cursor:pointer;}
.checklist-item-text.done{text-decoration:line-through;color:var(--rg3);}
.checklist-item-del{background:none;border:none;color:var(--rg3);cursor:pointer;font-size:0.72rem;opacity:0.45;transition:opacity .2s;}
.checklist-item-del:hover{opacity:1;}
.checklist-add-row{display:flex;gap:6px;margin-top:8px;}
.checklist-add-input{flex:1;border:1px dashed var(--rg3);border-radius:8px;background:transparent;padding:7px 10px;font-size:0.75rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;font-weight:600;}
.checklist-add-input::placeholder{color:var(--rg3);}
.checklist-add-btn{padding:7px 14px;border:none;border-radius:8px;background:var(--metal-bar);color:#6a2038;font-weight:800;font-size:0.72rem;cursor:pointer;}
.checklist-empty{font-size:0.72rem;color:var(--rg3);text-align:center;padding:10px 0;letter-spacing:0.08em;}

/* ─── CALENDAR ─── */
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--rg2);text-align:center;margin-bottom:12px;}
.cal-table{width:100%;text-align:center;}
.cal-table th{font-size:0.59rem;color:var(--rg3);padding-bottom:7px;font-weight:800;}
.cal-table td{padding:6px 2px;font-size:0.82rem;color:rgba(61,26,36,0.75);font-family:'Pretendard',sans-serif;font-weight:600;cursor:pointer;border-radius:50%;transition:background .15s;}
.cal-table td:hover:not(:empty){background:rgba(212,96,122,0.12);}
.cal-today{background:var(--rg)!important;color:white!important;border-radius:50%;font-weight:800;}
.cal-has-event{position:relative;}
.cal-has-event::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--rg3);}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-nav-btn{background:none;border:none;cursor:pointer;color:var(--rg3);font-size:0.75rem;padding:2px 6px;border-radius:6px;transition:color 0.15s,background 0.15s;}
.cal-nav-btn:hover{color:var(--rg);background:rgba(212,96,122,0.08);}
.cal-dday-mark{background:rgba(212,96,122,0.13)!important;border-radius:50%;font-weight:700;color:var(--rg2)!important;}

/* ─── CAL MODAL ─── */
.cal-modal-backdrop{position:fixed;inset:0;background:rgba(61,26,36,0.18);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeUp .18s ease;}
.cal-modal{background:var(--white);border-radius:16px;width:320px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(212,96,122,0.22);overflow:hidden;}
.cal-modal-header{background:var(--metal-bar);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.cal-modal-title{font-family:'Cormorant Garamond',serif;font-size:0.9rem;font-weight:700;color:#6a2038;letter-spacing:0.14em;}
.cal-modal-close{background:none;border:none;color:#6a2038;font-size:0.85rem;cursor:pointer;opacity:0.6;}
.cal-modal-close:hover{opacity:1;}
.cal-modal-body{padding:16px;}
.cal-modal-date{font-size:0.7rem;color:var(--rg2);font-weight:800;letter-spacing:0.1em;margin-bottom:12px;text-transform:uppercase;}
.cal-event-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;min-height:20px;}
.cal-event-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(252,232,239,0.7);border-radius:8px;border-left:3px solid var(--rg3);font-size:0.76rem;font-weight:600;color:var(--text);font-family:'Pretendard',sans-serif;}
.cal-event-del{background:none;border:none;color:var(--rg3);cursor:pointer;font-size:0.68rem;opacity:0.5;}
.cal-event-del:hover{opacity:1;}
.cal-event-add-row{display:flex;gap:6px;}
.cal-event-input{flex:1;border:1px dashed var(--rg3);border-radius:8px;background:transparent;padding:7px 10px;font-size:0.75rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;font-weight:600;}
.cal-event-input::placeholder{color:var(--rg3);}
.cal-event-add-btn{padding:7px 14px;border:none;border-radius:8px;background:var(--metal-bar);color:#6a2038;font-weight:800;font-size:0.72rem;cursor:pointer;}
.cal-modal-section-label{font-size:0.62rem;letter-spacing:0.15em;color:var(--rg3);text-transform:uppercase;margin-bottom:6px;font-weight:700;}
.cal-modal-divider{border:none;border-top:1px solid var(--border);margin:10px 0;}
.cal-dday-exists{display:flex;align-items:center;justify-content:space-between;font-size:0.78rem;color:var(--rg2);padding:4px 8px;background:rgba(212,96,122,0.07);border-radius:8px;}

/* ─── DDAY ─── */
.dday-item{text-align:center;padding:6px 0 2px;border-bottom:1px solid var(--border);position:relative;}
.dday-item:last-child{border-bottom:none;}
.dday-label{font-size:0.65rem;letter-spacing:0.14em;color:var(--rg3);text-transform:uppercase;margin-bottom:4px;}
.dday-num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--rg2);line-height:1;}
.dday-since{font-size:0.62rem;color:var(--text2);margin-top:4px;letter-spacing:0.08em;}
.dday-del-btn{position:absolute;top:6px;right:0;font-size:0.6rem;padding:1px 5px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--rg3);cursor:pointer;opacity:0;transition:opacity 0.15s;}
.dday-item:hover .dday-del-btn{opacity:1;}

/* ─── STICKY NOTE MEMO ─── */
.sticky-note-wrap {
  position: relative;
  padding: 0;
}
.sticky-note {
  background: linear-gradient(145deg, #fde8ef 0%, #fdd8e8 100%);
  min-height: 220px;
  padding: 14px 16px 44px;
  position: relative;
  border-radius: 18px;
  border: 1.5px solid rgba(212,96,122,0.13);
  box-shadow:
    0 2px 12px rgba(212,96,122,0.1),
    inset 0 1px 0 rgba(255,255,255,0.6);
}
.sticky-note::before { display: none; }
.sticky-note-tape { display: none; }
.sticky-memo-label {
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.22em;
  color: rgba(180,80,120,0.55);
  text-transform: uppercase;
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sticky-memo-label::before {
  content: '↘';
  font-size: 0.7rem;
  opacity: 0.6;
}
.sticky-textarea {
  width: 100%;
  min-height: 150px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Pretendard', sans-serif;
  font-size: 0.85rem;
  font-weight: 400;
  color: #7a2840;
  line-height: 1.9;
}
.sticky-textarea::placeholder { color: rgba(180,100,130,0.4); }
.sticky-save-btn {
  position: absolute;

  border: 1px solid rgba(212,96,122,0.2);
  border-radius: 20px;
  padding: 5px 14px;

  font-weight: 700;

.ai-sched-btn{display:block;width:100%;margin-top:10px;padding:7px;font-size:0.7rem;border:none;border-radius:10px;background:var(--metal-bar);color:#6a2038;font-weight:800;cursor:pointer;letter-spacing:0.08em;transition:opacity 0.15s;}
.ai-sched-btn:hover{opacity:0.85;}
.ai-sched-textarea{width:100%;min-height:90px;border:1px solid var(--border);border-radius:10px;background:#fff8fb;padding:10px;resize:vertical;outline:none;font-size:0.8rem;font-family:'Pretendard',sans-serif;color:var(--text);line-height:1.7;}
.ai-sched-img-label{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:0.72rem;color:var(--rg2);background:var(--white);cursor:pointer;transition:background 0.15s;}
.ai-sched-img-label:hover{background:var(--hover-metal);}
.ai-sched-run-btn{display:block;width:100%;margin-top:10px;padding:8px;border:none;border-radius:10px;background:var(--rg);color:white;font-weight:800;font-size:0.75rem;cursor:pointer;letter-spacing:0.08em;transition:opacity 0.15s;}
.ai-sched-run-btn:disabled{opacity:0.5;cursor:default;}
.ai-sched-loading{text-align:center;font-size:0.75rem;color:var(--rg3);padding:12px 0;}
.ai-sched-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 8px;border-radius:8px;background:rgba(252,232,239,0.5);border:1px solid var(--border);margin-bottom:6px;}
.ai-sched-item-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.ai-sched-date{font-size:0.63rem;color:var(--rg3);letter-spacing:0.08em;}
.ai-sched-event{font-size:0.78rem;font-weight:600;color:var(--text);}
.ai-sched-add-btn{flex-shrink:0;padding:4px 10px;border:1px solid var(--border);border-radius:10px;background:var(--white);color:var(--rg2);font-size:0.68rem;font-weight:700;cursor:pointer;transition:background 0.15s;}
.ai-sched-add-btn:hover:not(:disabled){background:var(--hover-metal);}
.ai-sched-addall-btn{display:block;width:100%;margin-top:8px;padding:7px;border:none;border-radius:10px;background:var(--metal-bar);color:#6a2038;font-weight:800;font-size:0.72rem;cursor:pointer;letter-spacing:0.06em;}

/* ─── IMAGE WIDGET ─── */
#w-memo{background:transparent!important;border:none!important;box-shadow:none!important;overflow:visible!important;cursor:grab;}
#w-memo .widget-body{overflow:visible!important;background:transparent!important;padding:0!important;}
#w-memo .sticky-textarea{cursor:text;}
.imgwidget-wrap{width:100%;}
.imgwidget-label{display:flex;width:100%;min-height:200px;cursor:pointer;border-radius:10px;overflow:hidden;position:relative;background:rgba(252,232,239,0.5);border:none;align-items:center;justify-content:center;}
.imgwidget-hint{text-align:center;color:var(--rg3);font-size:1.8rem;line-height:1.8;pointer-events:none;}
.imgwidget-img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px;}

/* ─── ATTACH ─── */
.attach-btn{display:inline-flex;align-items:center;padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--white);color:var(--rg2);font-size:1.1rem;cursor:pointer;transition:background 0.2s;margin-right:auto;line-height:1;}
.attach-btn:hover{background:var(--hover-metal);}
.attach-row{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0;}
.attach-tag{display:flex;align-items:center;gap:5px;background:rgba(252,232,239,0.8);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:0.7rem;color:var(--text2);max-width:180px;}

.attach-file-icon{font-size:1rem;flex-shrink:0;}
.attach-file-link{color:var(--rg2);text-decoration:none;display:flex;align-items:center;gap:4px;}

/* ─── NOTE PAGE ─── */
.note-page-area{position:relative;flex:1;min-height:600px;padding:20px 30px 100px;}
.draggable-post-window{position:absolute;width:500px;min-width:320px;min-height:180px;background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:0 6px 30px rgba(212,96,122,0.18);overflow:hidden;z-index:10;animation:fadeUp 0.3s ease both;display:flex;flex-direction:column;}
.draggable-post-window:hover{z-index:20;}
.draggable-post-window.dragging{z-index:50;box-shadow:0 16px 50px rgba(212,96,122,0.35);opacity:0.95;}
.post-window-header{background:var(--metal-bar);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:grab;user-select:none;flex-shrink:0;}
.post-window-header:active{cursor:grabbing;}
.post-window-header-left{display:flex;align-items:center;gap:8px;}
.post-window-dots{display:flex;gap:5px;}
.post-window-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.post-window-title{font-family:'Cormorant Garamond',serif;font-size:0.76rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.post-window-close{background:none;border:none;color:rgba(106,32,56,0.55);font-size:0.75rem;cursor:pointer;padding:2px 6px;border-radius:50%;transition:all 0.18s;line-height:1;font-weight:700;}
.post-window-close:hover{background:rgba(212,96,122,0.18);color:var(--rg2);}
.post-window-body{overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;}
.draggable-post-window:not(.resized) .post-window-body{max-height:480px;}
.note-list-box-body{padding:12px 14px;}
.note-list{display:flex;flex-direction:column;gap:6px;}
.note-list-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:#fffcfd;cursor:pointer;transition:all 0.2s;}
.note-list-item:hover{background:var(--hover-metal);border-color:var(--rg3);}
.note-list-item.active{background:var(--hover-metal);border-left:3px solid var(--rg);border-color:var(--rg);}
.note-list-item-title{font-size:0.82rem;font-weight:700;color:var(--text);font-family:'Pretendard',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.note-list-item-num{font-size:0.7rem;font-weight:800;color:var(--rg3);font-family:'Pretendard',sans-serif;flex-shrink:0;margin-right:10px;min-width:18px;}
.note-list-item-date{font-size:0.58rem;color:var(--text2);flex-shrink:0;margin-left:10px;}
.note-empty{text-align:center;padding:22px 0;color:var(--rg3);font-size:0.75rem;letter-spacing:0.08em;}
.note-detail-card-body{padding:20px;}
.note-detail-title{font-size:1.05rem;font-weight:800;color:var(--text);font-family:'Pretendard',sans-serif;margin-bottom:5px;letter-spacing:0.03em;}
.note-detail-date{font-size:0.62rem;color:var(--text2);margin-bottom:14px;}
.note-detail-content{font-size:0.86rem;color:var(--text2);line-height:1.9;font-family:'Pretendard',sans-serif;font-weight:500;white-space:pre-wrap;word-break:break-all;border-top:1px solid var(--border);padding-top:14px;}
.note-card-actions{display:flex;gap:2px;}
.note-card-edit-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--rg2);font-size:0.68rem;cursor:pointer;padding:3px 10px;font-weight:700;font-family:'Pretendard',sans-serif;transition:all 0.2s;}
.note-card-edit-btn:hover{background:var(--hover-metal);}
.note-card-del{background:none;border:1px solid rgba(212,96,122,0.3);border-radius:20px;color:var(--rg2);font-size:0.68rem;cursor:pointer;padding:3px 10px;font-weight:700;font-family:'Pretendard',sans-serif;transition:all 0.2s;}
.note-card-del:hover{background:rgba(212,96,122,0.1);}
.note-edit-box{padding:14px 16px 16px;background:rgba(252,232,239,0.25);border-top:1px solid var(--border);}
.note-edit-content{width:100%;min-height:90px;border:1px solid var(--border);border-radius:10px;background:#fff8fb;padding:10px;resize:none;outline:none;font-size:0.78rem;font-family:'Pretendard',sans-serif;color:var(--text);line-height:1.7;}
.note-edit-footer{display:flex;justify-content:flex-end;gap:7px;margin-top:10px;}
.note-edit-save{padding:6px 18px;border:none;border-radius:20px;background:var(--rg);color:white;font-weight:700;font-size:0.68rem;cursor:pointer;box-shadow:0 2px 6px rgba(212,96,122,0.25);}
.note-edit-cancel{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-weight:600;font-size:0.68rem;cursor:pointer;}
.note-edit-cancel:hover{background:var(--hover-metal);}
.note-detail-comment-section{margin-top:18px;border-top:1px solid var(--border);padding-top:14px;}
.note-detail-comment-title{font-size:0.68rem;font-weight:800;color:var(--rg2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;font-family:'Pretendard',sans-serif;}
.note-detail-comment-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px dashed rgba(212,96,122,0.1);font-size:0.78rem;}
.note-detail-comment-item:last-of-type{border-bottom:none;}
.note-detail-comment-text{color:var(--text2);flex:1;line-height:1.5;word-break:break-all;font-family:'Pretendard',sans-serif;}
.note-detail-comment-del{background:none;border:none;color:var(--rg3);font-size:0.65rem;cursor:pointer;opacity:0.4;transition:opacity 0.2s;flex-shrink:0;}
.note-detail-comment-del:hover{opacity:1;}
.note-detail-comment-write{display:flex;gap:6px;margin-top:10px;}
.note-detail-comment-input{flex:1;border:1px solid var(--border);border-radius:20px;background:#fff8fb;padding:6px 14px;font-size:0.72rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;}
.note-detail-comment-submit{padding:6px 14px;border:none;border-radius:20px;background:var(--rg);color:white;font-weight:700;font-size:0.68rem;cursor:pointer;flex-shrink:0;box-shadow:0 1px 5px rgba(212,96,122,0.2);}
.write-window-body{padding:16px;display:flex;flex-direction:column;height:100%;}
.note-content-input{flex:1;width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;background:#fff8fb;padding:12px;resize:none;outline:none;font-size:0.85rem;font-family:'Pretendard',sans-serif;font-weight:600;color:var(--text);line-height:1.8;display:block;overflow:auto;}
.note-write-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
.note-post-btn{padding:8px 22px;border:none;border-radius:20px;background:var(--rg);color:white;font-weight:700;font-size:0.72rem;cursor:pointer;box-shadow:0 2px 8px rgba(212,96,122,0.25);transition:opacity 0.2s;}
.note-post-btn:hover{opacity:0.85;}
.note-cancel-btn{padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);font-weight:600;font-size:0.72rem;cursor:pointer;}
.note-cancel-btn:hover{background:var(--hover-metal);}
.note-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--rg3);pointer-events:none;}
.note-hint-icon{font-size:2.5rem;margin-bottom:10px;opacity:0.5;}
.note-hint-text{font-size:0.8rem;letter-spacing:0.14em;opacity:0.6;font-weight:600;}
.resize-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:se-resize;z-index:5;}
.resize-handle-s{position:absolute;bottom:0;left:0;right:16px;height:6px;cursor:s-resize;z-index:4;}
.resize-handle-e{position:absolute;top:0;right:0;bottom:16px;width:6px;cursor:e-resize;z-index:4;}

/* ═══════════════════════════════════════════
   LOG PAGE  –  따뜻한 일기장 스타일
   ═══════════════════════════════════════════ */
.reflection-page {
  display: flex;
  gap: 28px;
  padding: 32px 36px;
  min-height: 100%;
  background: transparent;
}
.reflection-left {
  flex: 1;
  min-width: 0;
}
.reflection-right {
  width: 230px;
  flex-shrink: 0;
  position: sticky;
  top: 20px;
  align-self: flex-start;
}

/* 페이지 타이틀 영역 */
.rf-page-intro {
  margin-bottom: 32px;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(212,96,122,0.12);
}
.rf-page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: #7a2840;
  letter-spacing: 0.02em;
  line-height: 1.2;
  margin-bottom: 8px;
}
.rf-page-title em {
  font-style: italic;
  color: var(--rg);
}
.rf-page-sub {
  font-size: 0.72rem;
  color: #b07080;
  line-height: 1.85;
  font-family: 'Pretendard', sans-serif;
  font-weight: 400;
}

/* 성찰 질문 카드 - 일기장 엽서 스타일 */
.rf-card {
  position: relative;
  background: #fffaf8;
  border-radius: 3px;
  border: none;
  box-shadow:
    0 1px 3px rgba(180,80,100,0.08),
    0 6px 24px rgba(180,80,100,0.07),
    inset 0 0 0 1px rgba(212,96,122,0.1);
  overflow: visible;
  margin-bottom: 24px;
  animation: rfSlideIn 0.5s ease both;
}
.rf-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, #f0a0bc 0%, #e8829a 100%);
  border-radius: 3px 0 0 3px;
}
/* 줄무늬 배경 */
.rf-card-body {
  padding: 18px 22px 20px 26px;
  background-image: repeating-linear-gradient(
    transparent,
    transparent 31px,
    rgba(212,96,122,0.06) 31px,
    rgba(212,96,122,0.06) 32px
  );
  background-position: 0 18px;
}
.rf-card-header {
  background: transparent;
  padding: 16px 22px 0 26px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: none;
}
.rf-card-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f5b0c8, #e8829a);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 800;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(212,96,122,0.28);
}
.rf-card-label {
  font-size: 0.55rem; letter-spacing: 0.3em;
  color: #d4879a; text-transform: uppercase;
  font-weight: 700;
  font-family: 'Cormorant Garamond', serif;
}
.rf-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-weight: 700;
  color: #6a2038; flex: 1;
  letter-spacing: 0.01em;
}
@keyframes rfSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* textarea */
.rf-textarea {
  width: 100%;
  min-height: 96px;
  background: transparent;
  border: none;
  border-bottom: 1.5px dashed rgba(212,96,122,0.25);
  padding: 10px 2px 10px;
  font-family: 'Pretendard', sans-serif;
  font-size: 0.83rem;
  font-weight: 400;
  line-height: 1.95;
  color: #4a1828;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.rf-textarea::placeholder { color: #d4a0b0; font-size: 0.77rem; }
.rf-textarea:focus { border-bottom-color: var(--rg); }

/* 제출 버튼 */
.rf-submit-wrap {
  padding: 18px 0 6px;
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.rf-submit-btn {
  background: linear-gradient(135deg, #e8829a 0%, #d4607a 100%);
  color: white;
  border: none;
  padding: 12px 36px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 30px;
  box-shadow: 0 4px 16px rgba(212,96,122,0.3);
  transition: all 0.22s;
  white-space: nowrap;
}
.rf-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,96,122,0.42); }
.rf-submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.rf-btn-save {
  background: none;
  color: #5aaa78;
  border: 1.5px solid rgba(90,170,120,0.45);
  padding: 11px 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 30px;
  transition: all 0.2s;
  white-space: nowrap;
}
.rf-btn-save:hover { background: rgba(90,170,120,0.08); border-color: #5aaa78; transform: translateY(-1px); }
.rf-btn-reset {
  background: none;
  color: #b0a0a8;
  border: 1.5px solid rgba(180,160,168,0.35);
  padding: 11px 20px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 30px;
  transition: all 0.2s;
  white-space: nowrap;
}
.rf-btn-reset:hover { background: rgba(180,160,168,0.08); border-color: #b0a0a8; transform: translateY(-1px); }

/* 피드백 섹션 */
.rf-feedback-section { margin-top: 32px; }
.rf-feedback-divider {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.rf-feedback-divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,96,122,0.2), transparent);
}
.rf-feedback-divider-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.35em; color: #d4879a;
  text-transform: uppercase;
}

/* 피드백 카드 */
.rf-fb-card {
  background: #fffaf8;
  border-radius: 3px;
  border-left: 3px solid rgba(212,96,122,0.3);
  box-shadow: 0 2px 10px rgba(180,80,100,0.06);
  padding: 16px 20px;
  margin-bottom: 12px;
  animation: rfSlideIn 0.4s ease both;
  transition: border-left-color 0.2s, box-shadow 0.2s;
}
.rf-fb-card:hover { border-left-color: var(--rg); box-shadow: 0 4px 16px rgba(180,80,100,0.1); }
.rf-fb-card-label {
  font-size: 0.52rem; font-weight: 800;
  letter-spacing: 0.3em; color: #d4879a;
  text-transform: uppercase; margin-bottom: 8px;
  font-family: 'Cormorant Garamond', serif;
}
.rf-fb-card-content {
  font-size: 0.84rem; font-weight: 400;
  line-height: 2; color: #4a1828;
  white-space: pre-wrap;
  font-family: 'Pretendard', sans-serif;
}

/* Overall Insight */
.rf-overall-card {
  background: linear-gradient(135deg, #7a2840 0%, #9a3858 100%);
  border-radius: 3px;
  padding: 24px 28px;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
  animation: rfSlideIn 0.5s ease both;
  box-shadow: 0 6px 28px rgba(122,40,64,0.28);
}
.rf-overall-card::before {
  content: '✦';
  position: absolute;
  top: -10px; right: 18px;
  font-size: 80px;
  color: rgba(255,255,255,0.05);
  line-height: 1;
  font-family: serif;
  pointer-events: none;
}
.rf-overall-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #f5b0c8, #fff8fb, #f5b0c8);
}
.rf-overall-label {
  font-size: 0.52rem; font-weight: 800;
  letter-spacing: 0.3em; color: rgba(255,200,215,0.75);
  text-transform: uppercase; margin-bottom: 12px;
  font-family: 'Cormorant Garamond', serif;
}
.rf-overall-content {
  font-size: 0.88rem; font-weight: 400;
  line-height: 2.05; color: rgba(255,240,245,0.93);
  white-space: pre-wrap;
  font-family: 'Pretendard', sans-serif;
  position: relative; z-index: 1;
}

/* 로딩 */
.rf-loading { text-align: center; padding: 32px; }
.rf-loading-text {
  font-family: 'Pretendard', sans-serif;
  font-size: 0.78rem; letter-spacing: 0.2em;
  color: #d4879a; animation: rfPulse 1.5s ease-in-out infinite;
}
@keyframes rfPulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
.rf-loading-dots::after { content: ''; animation: rfDots 1.5s steps(4,end) infinite; }
@keyframes rfDots { 0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';} }

/* 오른쪽 기록 패널 - 손편지함 스타일 */
.rf-history-panel {
  background: #fffaf8;
  border-radius: 3px;
  border: none;
  box-shadow:
    0 2px 8px rgba(180,80,100,0.08),
    inset 0 0 0 1px rgba(212,96,122,0.1);
  overflow: hidden;
}
.rf-history-header {
  background: linear-gradient(135deg, #f5b0c8 0%, #f0a0bc 100%);
  padding: 11px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.rf-history-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.25em; color: #6a2038; text-transform: uppercase;
}
.rf-history-body { padding: 10px; max-height: 520px; overflow-y: auto; }
.rf-history-item {
  padding: 10px 12px;
  border-radius: 2px;
  border-left: 2px solid transparent;
  background: rgba(252,232,239,0.25);
  margin-bottom: 7px;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: 0 1px 4px rgba(180,80,100,0.05);
}
.rf-history-item:hover { background: rgba(252,232,239,0.7); border-left-color: var(--rg3); }
.rf-history-item.active { border-left-color: var(--rg); background: rgba(252,232,239,0.7); }
.rf-history-date { font-size: 0.58rem; color: #d4879a; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.1em; font-family: 'Cormorant Garamond', serif; }
.rf-history-preview { font-size: 0.73rem; color: #7a4050; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Pretendard', sans-serif; }
.rf-history-del {
  float: right; background: none; border: none;
  color: #d4879a; font-size: 0.62rem; cursor: pointer;
  opacity: 0.35; transition: opacity 0.15s; padding: 1px 4px;
}
.rf-history-del:hover { opacity: 1; }
.rf-history-empty { font-size: 0.72rem; color: #d4879a; text-align: center; padding: 20px 0; letter-spacing: 0.08em; font-family: 'Cormorant Garamond', serif; font-style: italic; }
.rf-new-btn {
  display: block; width: 100%; padding: 9px;
  background: none; border: 1px dashed rgba(212,96,122,0.3);
  border-radius: 2px; color: #b06070; font-size: 0.7rem;
  font-weight: 700; cursor: pointer; margin-top: 4px;
  letter-spacing: 0.1em; transition: background 0.15s;
  font-family: 'Cormorant Garamond', serif;
}
.rf-new-btn:hover { background: rgba(252,232,239,0.5); }

/* 오류 */
.rf-error { background: rgba(212,96,122,0.06); border-left: 3px solid rgba(212,96,122,0.3); color: #8a2040; padding: 12px 16px; font-family: 'Pretendard',sans-serif; font-size: 0.78rem; font-weight:400; line-height:1.7; margin-top:12px; border-radius:2px; }


/* ─── RESPONSIVE ─── */
/* 모바일 BGM 미니바 (헤더 안) */
.bgm-mini{display:none;}

@media (max-width: 768px) {
  /* 기본 레이아웃 */
  .site-wrap{flex-direction:column;}
  body{overflow-x:hidden;}

  /* 사이드바 → 상단 고정 탑바 */
  .sidebar{
    width:100%;height:auto;position:fixed;top:0;z-index:200;
    flex-direction:row;align-items:center;
    border-right:none;border-bottom:1px solid var(--border);
    overflow:visible;min-height:52px;
  }
  .sidebar-logo{
    padding:6px 10px;border-bottom:none;border-right:1px solid var(--border);
    flex-shrink:0;min-height:52px;
  }
  .sidebar-logo img{width:44px!important;height:44px!important;}
  .logo-text{font-size:1.2rem;}
  .logo-sub{display:none;}
  .logo-active-badge{margin-top:2px;font-size:0.42rem;padding:1px 6px;}
  nav{display:flex;flex-direction:row;overflow-x:auto;flex:1;padding:0 4px;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  .nav-group-label{display:none;}
  .nav-item{
    padding:16px 12px;font-size:0.72rem;white-space:nowrap;
    border-left:none;border-bottom:3px solid transparent;margin:0;
  }
  .nav-item:hover,.nav-item.active{
    border-bottom-color:var(--rg);border-left-color:transparent;background:none;
  }

  /* 메인 콘텐츠 상단 여백 (탑바 높이만큼) */
  .main{margin-top:52px;}
  .main-header{
    padding:8px 14px;flex-wrap:nowrap;gap:8px;
    min-height:auto;align-items:center;
    position:relative;z-index:10;
    justify-content:space-between;
  }
  .main-header-left img{height:32px!important;}
  .main-date{font-size:0.5rem;}
  .header-write-btn{font-size:0.68rem;padding:7px 12px;}

  /* 헤더 BGM 미니바 - 항상 헤더 우측에 표시 */
  .bgm-widget{display:none!important;}
  .bgm-mini{
    display:flex!important;align-items:center;gap:6px;
    background:rgba(252,232,239,0.85);
    border:1px solid rgba(212,96,122,0.2);
    border-radius:20px;padding:5px 10px 5px 7px;
    backdrop-filter:blur(8px);flex-shrink:0;
    margin-left:auto;
  }
  .bgm-mini-disc{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle,#2a0c18 0% 22%,transparent 22%),
      conic-gradient(from 0deg,#180810 0deg,#22101a 45deg,#180810 90deg,#22101a 135deg,#180810 180deg,#22101a 225deg,#180810 270deg,#22101a 315deg,#180810 360deg);
    box-shadow:0 0 0 1.5px #3a1020;flex-shrink:0;
  }
  .bgm-mini-disc.spinning{animation:vinylSpin 2.8s linear infinite;}
  .bgm-mini-title{
    font-size:0.6rem;font-weight:700;color:var(--text);
    max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .bgm-mini-btn{
    width:22px;height:22px;border-radius:50%;border:none;
    background:var(--rg);color:white;font-size:0.65rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;line-height:1;
  }

  /* 홈 위젯 → 세로 스크롤 */
  .home-widget-area{
    position:static!important;display:flex!important;
    flex-direction:column!important;gap:14px!important;
    padding:14px!important;min-height:auto!important;
    overflow:visible!important;
  }
  .draggable-widget{
    position:static!important;left:auto!important;top:auto!important;
    width:100%!important;height:auto!important;
    animation:fadeUp 0.4s ease both;
  }
  .hw-resize-s,.hw-resize-e,.hw-resize-se{display:none;}
  #w-memo .widget-body{cursor:default!important;}

  /* 게시판 */
  .draggable-post-window{position:relative!important;width:100%!important;left:auto!important;top:auto!important;margin-bottom:14px;}
  .note-page-area{padding:10px 10px 40px;}

  /* 성찰 페이지 */
  .reflection-page{flex-direction:column;padding:16px 14px 40px;}
  .reflection-right{width:100%;position:static;}
  .rf-history-body{max-height:300px;}

  /* 설정 */
  .widget{margin-bottom:0;}
}

@media (max-width: 480px) {
  .bgm-mini-title{max-width:60px;}
  .reflection-page{padding:12px 10px 30px;}
  .rf-card-header{flex-wrap:wrap;gap:6px;}
}

/* ── 잠금 화면 ── */
#lock-screen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1a0810 0%,#2a1020 50%,#1a0810 100%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.lock-logo{
  width:90px;height:90px;object-fit:contain;margin-bottom:28px;
  filter:drop-shadow(0 0 20px rgba(212,96,122,0.4));
  animation:lockFadeIn 0.8s ease both;
}
.lock-title{
  font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;
  color:#f0d8e0;letter-spacing:0.2em;margin-bottom:6px;
  animation:lockFadeIn 0.9s ease both;
}
.lock-sub{
  font-size:0.65rem;color:rgba(212,140,160,0.6);letter-spacing:0.25em;
  font-family:'Cormorant Garamond',serif;margin-bottom:36px;
  animation:lockFadeIn 1s ease both;
}
.lock-input-wrap{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  animation:lockFadeIn 1.1s ease both;
}
.lock-input{
  width:220px;padding:13px 20px;text-align:center;
  background:rgba(255,255,255,0.05);border:1px solid rgba(212,96,122,0.3);
  border-radius:30px;color:#f0d8e0;font-size:1.1rem;letter-spacing:0.4em;
  outline:none;font-family:'Cormorant Garamond',serif;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.lock-input:focus{border-color:rgba(212,96,122,0.7);box-shadow:0 0 0 3px rgba(212,96,122,0.12);}
.lock-input.shake{animation:lockShake 0.4s ease;}
.lock-btn{
  padding:11px 44px;border:none;border-radius:30px;
  background:linear-gradient(135deg,#e8829a 0%,#d4607a 100%);
  color:white;font-family:'Cormorant Garamond',serif;font-size:0.95rem;
  font-weight:700;letter-spacing:0.15em;cursor:pointer;
  box-shadow:0 4px 18px rgba(212,96,122,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
}
.lock-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(212,96,122,0.45);}
.lock-error{
  font-size:0.65rem;color:rgba(212,96,122,0.8);letter-spacing:0.1em;
  height:16px;font-family:'Pretendard',sans-serif;
}
@keyframes lockFadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes lockShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}

/* ═══════════════════════════════ 공통 feature page */
.feature-page{padding:28px 32px 60px;max-width:860px;display:flex;flex-direction:column;gap:22px;}
.feature-section{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(212,96,122,0.06);}
.feature-section-header{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(252,232,239,0.6),transparent);}
.feature-section-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--rg2);letter-spacing:0.12em;}
.feature-section-body{padding:18px 20px;}
.feature-page-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--rg2);letter-spacing:0.15em;}
.fp-btn{padding:7px 18px;border:none;border-radius:20px;background:linear-gradient(135deg,#e8829a,#d4607a);color:#fff;font-weight:700;font-size:0.7rem;cursor:pointer;letter-spacing:0.06em;transition:all 0.18s;white-space:nowrap;}
.fp-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(212,96,122,0.3);}
.fp-btn-ghost{padding:6px 14px;border:1.5px solid rgba(212,96,122,0.3);border-radius:20px;background:none;color:var(--rg2);font-weight:700;font-size:0.68rem;cursor:pointer;transition:all 0.18s;}
.fp-btn-ghost:hover{background:rgba(252,232,239,0.5);}
.fp-input{flex:1;border:1px dashed var(--rg3);border-radius:8px;background:transparent;padding:7px 12px;font-size:0.78rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;}

/* ① 습관 트래커 */
.habit-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.habit-name{font-size:0.72rem;color:var(--text2);min-width:76px;font-weight:600;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.habit-cells{display:flex;gap:3px;flex-wrap:wrap;flex:1;}
.habit-cell{width:13px;height:13px;border-radius:3px;background:rgba(212,96,122,0.08);cursor:pointer;border:none;padding:0;flex-shrink:0;transition:background 0.12s;}
.habit-cell.d1{background:rgba(212,96,122,0.25);}
.habit-cell.d2{background:rgba(212,96,122,0.5);}
.habit-cell.d3{background:rgba(212,96,122,0.75);}
.habit-cell.d4{background:#d4607a;}
.habit-streak{font-size:0.6rem;color:var(--rg3);font-weight:700;min-width:28px;text-align:right;flex-shrink:0;}
.habit-del-btn{background:none;border:none;color:rgba(212,96,122,0.35);cursor:pointer;font-size:0.8rem;flex-shrink:0;}
.habit-del-btn:hover{color:var(--rg);}

/* ② 무드 트래킹 */
.mood-emojis{display:flex;gap:8px;margin:10px 0 14px;}
.mood-btn{font-size:1.5rem;cursor:pointer;padding:5px 8px;border-radius:10px;border:2px solid transparent;transition:all 0.15s;background:none;line-height:1;}
.mood-btn:hover,.mood-btn.sel{border-color:var(--rg);background:rgba(252,232,239,0.6);transform:scale(1.1);}
.mood-history{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto;}
.mood-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;background:rgba(252,232,239,0.25);border:1px solid var(--border);}
.mood-item-emoji{font-size:1.1rem;flex-shrink:0;}
.mood-item-date{font-size:0.57rem;color:var(--rg3);font-weight:700;min-width:70px;font-family:'Cormorant Garamond',serif;}
.mood-item-text{font-size:0.72rem;color:var(--text2);flex:1;}
.mood-item-del{background:none;border:none;color:rgba(212,96,122,0.3);cursor:pointer;font-size:0.7rem;}
.mood-chart-wrap{display:flex;align-items:flex-end;gap:3px;height:52px;margin-top:12px;padding:0 2px;}
.mood-bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
.mood-bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#e8829a,#d4607a);min-height:3px;transition:height 0.3s;}
.mood-bar-lbl{font-size:0.45rem;color:var(--rg3);}

/* ③ 주간 리뷰 */
.wr-card{background:rgba(252,232,239,0.15);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.wr-label{font-size:0.58rem;font-weight:800;color:var(--rg);letter-spacing:0.2em;margin-bottom:7px;}
.wr-textarea{width:100%;border:none;border-bottom:1px dashed var(--rg3);background:transparent;padding:5px 2px;font-size:0.8rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;resize:none;line-height:1.6;box-sizing:border-box;}
.wr-history-item{padding:9px 14px;border-left:3px solid var(--rg3);margin-bottom:7px;background:rgba(252,232,239,0.12);border-radius:0 8px 8px 0;cursor:pointer;transition:background 0.15s;}
.wr-history-item:hover,.wr-history-item.active{background:rgba(252,232,239,0.4);border-left-color:var(--rg);}
.wr-history-date{font-size:0.57rem;color:var(--rg3);font-weight:700;font-family:'Cormorant Garamond',serif;margin-bottom:3px;}
.wr-history-preview{font-size:0.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ④ 목표 로드맵 */
.goal-tree{display:flex;flex-direction:column;gap:6px;}
.goal-node{border-radius:10px;padding:12px 14px;position:relative;}
.goal-node.big{background:linear-gradient(135deg,rgba(212,96,122,0.1),rgba(232,130,154,0.05));border:1.5px solid rgba(212,96,122,0.28);}
.goal-node.month{background:rgba(252,232,239,0.35);border:1px solid var(--border);margin-left:18px;}
.goal-node.week{background:rgba(255,255,255,0.55);border:1px dashed var(--border);margin-left:36px;}
.goal-node-lbl{font-size:0.52rem;font-weight:800;color:var(--rg3);letter-spacing:0.18em;margin-bottom:5px;}
.goal-node-text{font-size:0.8rem;color:var(--text);width:calc(100% - 22px);border:none;background:transparent;outline:none;font-family:'Pretendard',sans-serif;resize:none;line-height:1.5;}
.goal-node-del{position:absolute;top:10px;right:10px;background:none;border:none;color:rgba(212,96,122,0.3);cursor:pointer;font-size:0.75rem;}
.goal-node-del:hover{color:var(--rg);}
.goal-indent-line{width:2px;height:10px;background:rgba(212,96,122,0.15);margin-left:18px;}

/* ⑤ 시간 블록 플래너 */
.tb-wrap{overflow-x:auto;}
.tb-grid{display:grid;grid-template-columns:46px 1fr 1fr;gap:0;min-width:320px;}
.tb-hdr{font-size:0.58rem;font-weight:800;color:var(--rg3);letter-spacing:0.12em;padding:6px 8px;text-align:center;background:rgba(252,232,239,0.35);border-bottom:1px solid var(--border);}
.tb-time{font-size:0.6rem;color:var(--rg3);padding:0 6px;text-align:right;border-bottom:1px dashed rgba(212,96,122,0.1);font-family:'Cormorant Garamond',serif;font-weight:600;display:flex;align-items:center;justify-content:flex-end;min-height:28px;}
.tb-cell{border-bottom:1px dashed rgba(212,96,122,0.08);border-left:1px solid rgba(212,96,122,0.06);}
.tb-inp{width:100%;height:28px;border:none;background:transparent;padding:3px 8px;font-size:0.7rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;}
.tb-inp:focus{background:rgba(252,220,232,0.35);}
.tb-inp.actual-col{background:rgba(232,250,240,0.2);}
.tb-date-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tb-date-lbl{font-family:'Cormorant Garamond',serif;font-size:0.9rem;font-weight:700;color:var(--rg2);letter-spacing:0.08em;}
.tb-nav-btn{background:none;border:1px solid var(--border);border-radius:50%;width:24px;height:24px;cursor:pointer;color:var(--rg2);font-size:0.75rem;display:flex;align-items:center;justify-content:center;}

/* ⑥ 성장 지표 */
.growth-card{background:rgba(252,232,239,0.15);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.growth-card-name{font-size:0.7rem;font-weight:800;color:var(--rg2);letter-spacing:0.1em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.growth-svg{width:100%;height:72px;overflow:visible;display:block;}
.growth-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.growth-chip{padding:2px 9px;background:rgba(212,96,122,0.1);border-radius:10px;font-size:0.6rem;color:var(--rg2);display:flex;align-items:center;gap:4px;}
.growth-chip button{background:none;border:none;color:rgba(212,96,122,0.4);cursor:pointer;font-size:0.65rem;padding:0;line-height:1;}
.growth-add-row{display:flex;gap:7px;margin-top:10px;align-items:center;}
.growth-val-inp{width:72px;border:1px dashed var(--rg3);border-radius:8px;background:transparent;padding:6px 10px;font-size:0.78rem;color:var(--text);outline:none;font-family:'Pretendard',sans-serif;text-align:center;}
.growth-add-row input[type=text]{flex:1;}

/* ⑧ 포모도로 */
.pomo-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:6px 0;}
.pomo-ring-wrap{position:relative;width:156px;height:156px;}
.pomo-ring-wrap svg{transform:rotate(-90deg);}
.pomo-ring-bg{fill:none;stroke:rgba(212,96,122,0.1);stroke-width:9;}
.pomo-ring-prog{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 0.95s linear;}
.pomo-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pomo-time{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:700;color:var(--rg2);line-height:1;}
.pomo-mode-lbl{font-size:0.52rem;color:var(--rg3);letter-spacing:0.18em;margin-top:3px;}
.pomo-controls{display:flex;gap:10px;align-items:center;}
.pomo-main-btn{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,#e8829a,#d4607a);color:#fff;font-size:1.1rem;cursor:pointer;box-shadow:0 3px 12px rgba(212,96,122,0.32);transition:all 0.18s;}
.pomo-main-btn:hover{transform:scale(1.06);}

</style>

<script>
// ─── 데이터 관리 ───
const DEFAULT_MENUS = [
  {id:'profile_board', name:'프로필',   group:'CHA.'},
  {id:'log',           name:'로그',     group:'CHA.'},
  {id:'habit',         name:'습관',     group:'GROWTH'},
  {id:'mood',          name:'무드',     group:'GROWTH'},
  {id:'weekly',        name:'주간리뷰', group:'GROWTH'},
  {id:'goals',         name:'목표맵',   group:'GROWTH'},
  {id:'timeblock',     name:'타임블록', group:'PLAN'},
  {id:'growth',        name:'성장지표', group:'PLAN'},
  {id:'pomo',          name:'포모도로', group:'PLAN'},
  {id:'makenote',      name:'제작노트', group:'MAKE'},
  {id:'diary',         name:'일기',     group:'ETC'}
];

function loadUserMenus(){
  const saved = localStorage.getItem('userMenus');
  if(!saved) return DEFAULT_MENUS;
  try {
    const parsed = JSON.parse(saved);
    return parsed.filter(m => m.id !== 'trial_sched' && m.id !== 'bankruptcy_sched' && m.id !== 'profile');
  } catch(e){ return DEFAULT_MENUS; }
}

let userMenus = loadUserMenus();
const _menuVersion = 'v5';
if(localStorage.getItem('menuVersion') !== _menuVersion){
  localStorage.removeItem('userMenus');
  localStorage.setItem('menuVersion', _menuVersion);
  userMenus = DEFAULT_MENUS;
}
let memoContent = localStorage.getItem('memoContent') || '';
let currentPage = 'profile';

function getPosts(pageId){ return JSON.parse(localStorage.getItem('posts_'+pageId)) || []; }
function savePosts(pageId,posts){ localStorage.setItem('posts_'+pageId, JSON.stringify(posts)); }
let currentBoardPage = 'note';

// ─── Sidebar ───
function renderSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  let currentGroup = '';
  userMenus.forEach(menu => {
    if(menu.group !== currentGroup){
      currentGroup = menu.group;
      const label = document.createElement('div');
      label.className = 'nav-group-label';
      label.textContent = currentGroup;
      nav.appendChild(label);
    }
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.textContent = menu.name;
    a.setAttribute('data-id', menu.id);
    a.onclick = () => loadPage(menu.id);
    nav.appendChild(a);
  });
  const settingsBtn = document.createElement('a');
  settingsBtn.className = 'nav-item';
  settingsBtn.style.cssText = 'color:var(--rg3);font-weight:700;';
  settingsBtn.textContent = '⚙ 설정';
  settingsBtn.setAttribute('data-id', 'settings');
  settingsBtn.onclick = () => loadPage('settings');
  nav.appendChild(settingsBtn);
}

// ─── 페이지 로드 ───
function loadPage(pageId){
  currentPage = pageId;
  const content = document.getElementById('main-content');
  content.innerHTML = '';

  // 홈을 벗어날 때 wp 타이머 멈춤 방지 — interval은 유지, 다시 홈 오면 wpUpdateUI()로 복원
  // 단 페이지 전환 시 title 복원
  if(pageId !== 'profile' && !_wp.running) {
    document.title = 'DOXX4E';
  }

  const logo = document.querySelector('.sidebar-logo');
  logo.classList.toggle('logo-active', pageId === 'profile');

  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.getAttribute('data-id') === pageId);
  });

  const writeBtn = document.getElementById('header-write-btn');
  const noWritePages = ['profile','settings','log','habit','mood','weekly','goals','timeblock','growth','pomo'];
  if(!noWritePages.includes(pageId)){
    writeBtn.classList.remove('hidden');
  } else {
    writeBtn.classList.add('hidden');
  }

  if(pageId === 'profile')        renderHomeWidgets(content);
  else if(pageId === 'profile_board') renderBoardPage(pageId, content);
  else if(pageId === 'settings')  renderSettings(content);
  else if(pageId === 'log')       renderReflectionPage(content);
  else if(pageId === 'habit')     renderHabitPage(content);
  else if(pageId === 'mood')      renderMoodPage(content);
  else if(pageId === 'weekly')    renderWeeklyPage(content);
  else if(pageId === 'goals')     renderGoalsPage(content);
  else if(pageId === 'timeblock') renderTimeblockPage(content);
  else if(pageId === 'growth')    renderGrowthPage(content);
  else if(pageId === 'pomo')      renderPomoPage(content);
  else                            renderBoardPage(pageId, content);
}

// ════════════════════════════════════════
// ✦ 성찰 시스템 (로그 탭)
// ════════════════════════════════════════
function getReflections(){ return JSON.parse(localStorage.getItem('reflections') || '[]'); }
function saveReflections(arr){ localStorage.setItem('reflections', JSON.stringify(arr)); }

let rfCurrentId = null;

function renderReflectionPage(container){
  rfCurrentId = null;
  const page = document.createElement('div');
  page.className = 'reflection-page';
  page.id = 'reflection-page';

  const left = document.createElement('div');
  left.className = 'reflection-left';
  left.id = 'rf-left';
  left.innerHTML = buildReflectionForm();

  const right = document.createElement('div');
  right.className = 'reflection-right';
  right.innerHTML = `
    <div class="rf-history-panel">
      <div class="rf-history-header">
        <span class="rf-history-title">✦ 기록</span>
      </div>
      <div class="rf-history-body" id="rf-history-body"></div>
    </div>
  `;

  page.appendChild(left);
  page.appendChild(right);
  container.appendChild(page);
  renderReflectionHistory();
}

function buildReflectionForm(data){
  const q1 = data?.q1 || '';
  const q2 = data?.q2 || '';
  const q3 = data?.q3 || '';
  const q4 = data?.q4 || '';
  return `
    <div class="rf-page-intro">
      <div class="rf-page-title">나를 향한<br><em>네 가지 질문</em></div>
      <div class="rf-page-sub">솔직하게 쓸수록, 더 깊은 통찰이 돌아옵니다.<br>판단하지 말고, 지금 이 순간 떠오르는 것을 그대로 적으세요.</div>
    </div>

    <div class="rf-card" style="animation-delay:0.05s">
      <div class="rf-card-header">
        <div class="rf-card-num">1</div>
        <span class="rf-card-label">Goal</span>
        <span class="rf-card-title">나는 무엇을 원하는가?</span>
      </div>
      <div class="rf-card-body">
        <textarea class="rf-textarea" id="rf-q1" placeholder="최종적인 목표와 그 이유를 적어주세요.">${escHtml(q1)}</textarea>
      </div>
    </div>

    <div class="rf-card" style="animation-delay:0.10s">
      <div class="rf-card-header">
        <div class="rf-card-num">2</div>
        <span class="rf-card-label">Action</span>
        <span class="rf-card-title">나는 그것을 얻기 위해 무엇을 했는가?</span>
      </div>
      <div class="rf-card-body">
        <textarea class="rf-textarea" id="rf-q2" placeholder="지금까지 실행한 구체적인 행동들을 적어주세요.">${escHtml(q2)}</textarea>
      </div>
    </div>

    <div class="rf-card" style="animation-delay:0.15s">
      <div class="rf-card-header">
        <div class="rf-card-num">3</div>
        <span class="rf-card-label">Obstacle</span>
        <span class="rf-card-title">그것을 방해하는 것은 무엇인가?</span>
      </div>
      <div class="rf-card-body">
        <textarea class="rf-textarea" id="rf-q3" placeholder="내부적/외부적 방해 요인을 솔직하게 적어주세요.">${escHtml(q3)}</textarea>
      </div>
    </div>

    <div class="rf-card" style="animation-delay:0.20s">
      <div class="rf-card-header">
        <div class="rf-card-num">4</div>
        <span class="rf-card-label">Solution</span>
        <span class="rf-card-title">그 방해물을 어떻게 제거할까?</span>
      </div>
      <div class="rf-card-body">
        <textarea class="rf-textarea" id="rf-q4" placeholder="지금 바로 실행할 수 있는 작은 해결책을 적어주세요.">${escHtml(q4)}</textarea>
      </div>
    </div>

    <div id="rf-error" class="rf-error" style="display:none;"></div>

    <div class="rf-submit-wrap" style="margin-top:6px;">
      <button class="rf-submit-btn" id="rf-submit-btn" onclick="submitReflection()">분석 및 피드백 받기</button>
      <button class="rf-btn-save" id="rf-save-btn" onclick="saveReflectionLocal()">저장 ✦</button>
      <button class="rf-btn-reset" id="rf-reset-btn" onclick="resetReflection()">↺ 초기화</button>
    </div>

    <div id="rf-feedback-area"></div>
  `;
}

// ════════════════════════════════════════════════
// ✦ CORE4 심층 분석 엔진 — 로컬 로직 전용
// ════════════════════════════════════════════════
function rfAnalyze(q1, q2, q3, q4) {

  /* ── 유틸 ── */
  const has      = (t, ws) => ws.some(w => t.includes(w));
  const hasAll   = (t, ws) => ws.every(w => t.includes(w));
  const countW   = t => t.trim().replace(/\s+/g,' ').split(' ').filter(Boolean).length;
  const countS   = t => (t.match(/[.!?。！？\n]/g)||[]).length || 1;
  const ratio    = (a,b) => b===0 ? 0 : +(a/b).toFixed(2);
  const pick     = arr => arr[Math.floor(Math.random()*arr.length)];

  /* ── 키워드 사전 ── */
  const KW = {
    // 목표 유형
    result_kw:   ['돈','부자','성공','수익','매출','억','월급','주식','부동산','재테크','돈벌'],
    process_kw:  ['되고싶','하고싶','만들고','배우','성장','기여','즐기','유지','습관','실력','역량'],
    vague_kw:    ['행복','좋게','잘','더','막연','그냥','어떻게든','언젠가','좀','많이'],
    why_kw:      ['왜냐','때문','위해','이유','하려고','하고싶어서','원하는이유','가치','의미'],
    deadline_re: /\d+년|\d+월|\d+주|\d+일|올해|내년|이번|까지|목표일|데드라인/,

    // 행동 유형
    deep_act:    ['매일','꾸준','기록','연습','완성','제출','시작했','진행','완료','만들었','배웠','올렸','보냈','등록','신청','실행'],
    surface_act: ['찾아봤','읽었','봤','알아봤','조사했','계획','준비중','생각했','메모','검색','구경'],
    no_act:      ['못했','안했','없었','아직','못하','하지못','실패','안됐','못 했'],
    repeat_act:  ['매일','항상','반복','꾸준히','지속','계속','습관적으로'],

    // 방해물 유형
    internal_obs:['두려움','불안','귀찮','무기력','자신없','포기','완벽','눈치','두렵','겁','지침','번아웃','나태','미루','게으','자괴감','우울','의심'],
    external_obs:['시간없','돈없','환경','사람','가족','회사','직장','바빠','일이','취업','학교','취준','비용','인프라'],
    mixed_obs:   ['의지','집중','집중력','흔들','유혹','SNS','유튜브','핸드폰','스마트폰','딴짓','산만'],
    vague_obs:   ['모르겠','없는것같','딱히','그냥','여러가지','복잡','뭔가'],

    // 전략 유형
    system_sol:  ['알람','루틴','일정','환경','삭제','차단','장소','카페','약속','달력','기록장','제거','설치','노션','앱','트래커','자동','구조'],
    will_sol:    ['노력','최선','열심히','의지','각오','다짐','마음먹','이번엔','진짜로','열심'],
    if_then:     ['하면','때는','경우','그러면','대신','대안','상황에서','조건'],
    small_step:  ['작게','조금씩','5분','10분','조금','작은','단계','일단','먼저','하나씩'],
    vague_sol:   ['해야지','해볼게','해보겠','생각해볼','고민','아마','어떻게든','해결'],
  };

  const fb = { feedback1:'', feedback2:'', feedback3:'', feedback4:'', overall:'' };
  const tags = [];
  let score = 0; // 0~100 성찰 품질 점수

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // [ LAYER 1 ] 목표(Goal) 분석
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const q1w = countW(q1);
  const hasWhy      = has(q1, KW.why_kw);
  const hasDeadline = KW.deadline_re.test(q1);
  const isResult    = has(q1, KW.result_kw);
  const isProcess   = has(q1, KW.process_kw);
  const isVague     = has(q1, KW.vague_kw);

  if (q1w < 5) {
    fb.feedback1 = '목표가 너무 짧습니다. 뇌는 5단어 이하의 명령을 "나중에 할 일"로 분류합니다. "무엇을(What) · 왜(Why) · 언제까지(When)"라는 세 축이 모두 있어야 실행 회로가 켜집니다. 지금 당장 목표를 두 문장 이상으로 다시 써보세요.';
    tags.push('목표 너무 짧음');
  } else if (isVague && !isProcess) {
    fb.feedback1 = '"행복", "잘", "더"처럼 측정 불가능한 단어가 목표 안에 있습니다. 이 언어는 뇌에게 방향이 아닌 감정만 전달합니다. 구체적인 장면으로 바꾸세요. 예: "행복해지고 싶다" → "매주 내가 선택한 작업으로 4시간 이상 보내는 삶". 측정 가능할수록 행동이 선명해집니다.';
    tags.push('추상적 목표');

    overall = `방해물(Q3)과 전략(Q4)이 일치하지 않는 패턴이 있습니다. 내면의 방해물을 인식했지만, 전략이 그것을 직접 겨냥하지 않습니다. 방해물마다 대응 전략을 1:1로 맞춰보세요. 오늘 할 One Thing: Q3에서 가장 자주 반복되는 방해물 하나를 골라, 그것이 발생하는 구체적인 시간과 장소를 특정하고, 그 환경 자체를 바꾸는 행동을 하세요.`;
  } else {
    const quality = score < 20 ? '초기 단계' : score < 40 ? '성장 중' : '탄탄한 수준';
    overall = `이번 성찰은 ${quality}입니다(추정 점수: ${Math.min(Math.max(score,5), 95)}점). ${tags.length > 0 ? '주요 패턴: ' + tags.slice(0,2).join(' · ') + '.' : ''} 성찰의 빈도보다 중요한 것은 성찰 후 72시간 내의 행동입니다. 오늘 할 One Thing: Q4의 전략을 지금 바로 "오늘 몇 시에, 어디서, 무엇을" 형식으로 구체화하고 실행 시간을 지금 정하세요.`;
  }

  fb.overall = overall;
  return fb;
}

// ── 제출 함수 ──
function submitReflection(){
  const q1 = document.getElementById('rf-q1')?.value.trim();
  const q2 = document.getElementById('rf-q2')?.value.trim();
  const q3 = document.getElementById('rf-q3')?.value.trim();
  const q4 = document.getElementById('rf-q4')?.value.trim();
  const errEl = document.getElementById('rf-error');

  if(!q1 || !q2 || !q3 || !q4){
    errEl.textContent = '모든 항목을 입력해야 정확한 분석이 가능합니다.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const result = rfAnalyze(q1, q2, q3, q4);

  // 저장
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const record = { id:'rf_'+Date.now(), date:dateStr, q1, q2, q3, q4, feedback:result };
  rfCurrentId = record.id;
  const reflections = getReflections();
  reflections.push(record);
  saveReflections(reflections);
  renderReflectionHistory();

  renderFeedbackUI(result, '✦ System Insight');
}

function saveReflectionLocal(){
  const q1 = document.getElementById('rf-q1')?.value || '';
  const q2 = document.getElementById('rf-q2')?.value || '';
  const q3 = document.getElementById('rf-q3')?.value || '';
  const q4 = document.getElementById('rf-q4')?.value || '';
  localStorage.setItem('rf_draft', JSON.stringify({q1,q2,q3,q4}));
  const btn = document.getElementById('rf-save-btn');
  if(btn){ const orig=btn.textContent; btn.textContent='저장됨 ✓'; setTimeout(()=>btn.textContent=orig,1500); }
}

function renderReflectionHistory(){
  const body = document.getElementById('rf-history-body');
  if(!body) return;
  const reflections = getReflections().slice().reverse();
  if(reflections.length === 0){
    body.innerHTML = `<div class="rf-history-empty">✦ 아직 기록이 없습니다</div>`;
    return;
  }
  body.innerHTML = reflections.map(r => `
    <div class="rf-history-item ${r.id === rfCurrentId ? 'active' : ''}" id="rf-hist-${r.id}" onclick="loadReflection('${r.id}')">
      <button class="rf-history-del" onclick="event.stopPropagation();deleteReflection('${r.id}')">✕</button>
      <div class="rf-history-date">${r.date}</div>
      <div class="rf-history-preview">${escHtml(r.q1.substring(0,40))}${r.q1.length>40?'…':''}</div>
    </div>`).join('') +
    `<button class="rf-new-btn" onclick="resetReflection()">+ 새 고찰 작성</button>`;
}

function loadReflection(id){
  const record = getReflections().find(r => r.id === id);
  if(!record) return;
  rfCurrentId = id;

  const left = document.getElementById('rf-left');
  if(!left) return;
  left.innerHTML = buildReflectionForm({ q1:record.q1, q2:record.q2, q3:record.q3, q4:record.q4 });

  if(record.feedback){
    renderFeedbackUI(record.feedback, '✦ Saved Feedback');
  }
  renderReflectionHistory();
}

function deleteReflection(id){
  const arr = getReflections().filter(r => r.id !== id);
  saveReflections(arr);
  if(rfCurrentId === id) resetReflection();
  else renderReflectionHistory();
}

function resetReflection(){
  rfCurrentId = null;
  const draft = localStorage.getItem('rf_draft');
  const data = draft ? JSON.parse(draft) : null;
  const left = document.getElementById('rf-left');
  if(left){ left.innerHTML = buildReflectionForm(data); }
  renderReflectionHistory();
  document.getElementById('rf-left')?.scrollIntoView({behavior:'smooth',block:'start'});
}
