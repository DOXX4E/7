<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOXX4E</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --metal-bar: linear-gradient(90deg,
    #f0a0bc 0%, #f5b0c8 20%, #f8c0d4 40%,
    #f5b0c8 60%, #ffffff 75%, #f5b0c8 85%, #f0a0bc 100%);
  --hover-metal: linear-gradient(90deg,
    #fad4e4 0%, #fde0ec 40%, #fde8f2 60%,
    #ffffff 75%, #fde0ec 85%, #fad4e4 100%);
  --rg:    #d4607a;
  --rg2:   #b5405e;
  --rg3:   #e8829a;
  --text:  #3d1a24;
  --text2: #8a4a5a;
  --border: rgba(212,96,122,0.18);
  --white: #fff8fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;font-family:'Noto Sans KR',sans-serif;
  background:#fce8ef;
  background-image:
    radial-gradient(ellipse at 15% 10%, rgba(255,182,210,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(232,130,154,0.2) 0%, transparent 45%);
}

/* ─── LAYOUT ─── */
.site-wrap{display:flex;min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:180px;flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-logo{padding:22px 16px 16px;border-bottom:1px solid var(--border);}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--rg2);letter-spacing:0.08em;line-height:1;}
.logo-sub{font-size:0.58rem;letter-spacing:0.28em;color:var(--text2);margin-top:3px;text-transform:uppercase;}
.nav-group-label{font-size:0.57rem;letter-spacing:0.26em;color:var(--rg3);text-transform:uppercase;padding:10px 16px 3px;font-weight:700;}
.nav-item{
  display:block;padding:7px 16px 7px 22px;
  font-size:0.77rem;color:var(--text2);text-decoration:none;
  letter-spacing:0.04em;transition:background .2s,color .2s;
  border-left:2px solid transparent;
}
.nav-item:hover,.nav-item.active{color:var(--rg2);background:var(--hover-metal);border-left-color:var(--rg);}

/* ─── BGM WIDGET ─── */
.bgm-widget{
  margin:auto 10px 14px;
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);
  background:var(--white);
  box-shadow:0 2px 12px rgba(212,96,122,0.10);
}
.bgm-header{
  background:var(--metal-bar);
  padding:7px 11px;
  display:flex;align-items:center;justify-content:space-between;
}
.bgm-header-title{font-family:'Cormorant Garamond',serif;font-size:0.66rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.bgm-dots{display:flex;gap:4px;}
.bgm-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.bgm-body{padding:12px 11px 14px;}

/* ── 턴테이블 씬 ── */
.record-scene{position:relative;width:100%;height:100px;margin:0 auto 10px;}

/* 레코드 판 — 왼쪽으로 살짝 치우침, 오른쪽에 톤암 공간 확보 */
.record-disc{
  position:absolute;bottom:0;left:44%;
  transform:translateX(-50%);
  width:96px;height:96px;border-radius:50%;
  background:
    radial-gradient(circle,#2a0c18 0% 11%,transparent 11%),
    radial-gradient(circle,#1e0810 0% 13%,transparent 13%),
    radial-gradient(circle,#2a0c18 0% 22%,transparent 22%),
    radial-gradient(circle,#1e0810 0% 24%,transparent 24%),
    radial-gradient(circle,#2a0c18 0% 38%,transparent 38%),
    radial-gradient(circle,#1e0810 0% 40%,transparent 40%),
    conic-gradient(from 0deg,
      #180810 0deg,#22101a 9deg,#180810 18deg,#22101a 27deg,
      #180810 36deg,#22101a 45deg,#180810 54deg,#22101a 63deg,
      #180810 72deg,#22101a 81deg,#180810 90deg,#22101a 99deg,
      #180810 108deg,#22101a 117deg,#180810 126deg,#22101a 135deg,
      #180810 144deg,#22101a 153deg,#180810 162deg,#22101a 171deg,
      #180810 180deg,#22101a 189deg,#180810 198deg,#22101a 207deg,
      #180810 216deg,#22101a 225deg,#180810 234deg,#22101a 243deg,
      #180810 252deg,#22101a 261deg,#180810 270deg,#22101a 279deg,
      #180810 288deg,#22101a 297deg,#180810 306deg,#22101a 315deg,
      #180810 324deg,#22101a 333deg,#180810 342deg,#22101a 351deg,
      #180810 360deg);
  box-shadow:0 0 0 2px #3a1020,0 5px 18px rgba(0,0,0,0.45);
  z-index:1;
}
.record-disc.spinning{animation:vinylSpin 2.8s linear infinite;}
@keyframes vinylSpin{
  from{transform:translateX(-50%) rotate(0deg);}
  to{transform:translateX(-50%) rotate(360deg);}
}

/* 센터 라벨 */
.record-label{
  position:absolute;bottom:32px;left:44%;
  transform:translateX(-50%);
  width:32px;height:32px;border-radius:50%;
  background:var(--metal-bar);
  box-shadow:0 0 0 1.5px rgba(200,80,120,0.5);
  z-index:2;overflow:hidden;
}
.record-label-thumb{width:100%;height:100%;border-radius:50%;object-fit:cover;display:none;opacity:0.88;}
.record-hole{
  position:absolute;bottom:47px;left:calc(44% - 3px);
  width:6px;height:6px;border-radius:50%;
  background:#180810;z-index:5;
}

/* 피벗 장식 */
.tonearm-pivot{
  position:absolute;top:2px;right:5px;
  width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fce8f0,#d06888);
  box-shadow:0 1px 5px rgba(0,0,0,0.4),inset 0 1px 1px rgba(255,255,255,0.5);
  z-index:12;
}

/*
  톤암 상태:
  기본(대기/멈춤/일시정지) → rotate(0deg)  : 수직 일직선
  .on-record(재생)         → rotate(25deg) : 레코드 위로 기울어짐
*/
.tonearm-wrap{
  position:absolute;top:0;right:2px;
  width:22px;height:98px;z-index:11;
  transform-origin:50% 4%;
  transform:rotate(0deg);
  transition:transform 0.85s cubic-bezier(0.4,0,0.2,1);
}
.tonearm-wrap.on-record{transform:rotate(25deg);}
.tonearm-wrap svg{width:100%;height:100%;overflow:visible;}

/* Info */
.bgm-info{text-align:center;margin-bottom:9px;}
.bgm-track-title{font-size:0.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.bgm-track-channel{font-size:0.6rem;color:var(--text2);}

/* Controls */
.bgm-controls{display:flex;justify-content:center;gap:8px;align-items:center;margin-bottom:9px;}
.bgm-btn{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border);background:var(--white);
  color:var(--rg2);font-size:0.65rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s;line-height:1;padding:0;flex-shrink:0;
}
.bgm-btn:hover{background:var(--hover-metal);}
.bgm-btn.play-btn{
  width:34px;height:34px;font-size:0.95rem;
  background:var(--metal-bar);color:#6a2038;
  border:none;box-shadow:0 2px 8px rgba(212,96,122,0.25);
  line-height:1;padding:0;
}
.bgm-btn.play-btn:hover{opacity:0.85;}

/* Playlist */
.bgm-playlist{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow-y:auto;}
.bgm-playlist::-webkit-scrollbar{width:3px;}
.bgm-playlist::-webkit-scrollbar-thumb{background:rgba(212,96,122,0.25);border-radius:2px;}
.pl-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.pl-item:hover{background:var(--hover-metal);}
.pl-item.active{background:rgba(212,96,122,0.1);border-color:rgba(212,96,122,0.22);}
.pl-thumb{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:rgba(212,96,122,0.1);}
.pl-info{flex:1;min-width:0;}
.pl-title{font-size:0.63rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-ch{font-size:0.57rem;color:var(--text2);}

/* ─── MAIN ─── */
.main{flex:1;padding:34px 30px;overflow-y:auto;}
.main-header{margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.main-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--rg2);letter-spacing:0.06em;margin-bottom:4px;}
.main-date{font-size:0.7rem;color:var(--text2);letter-spacing:0.12em;}

/* Widget grid */
.widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.widget{
  background:var(--white);border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(212,96,122,0.08);
  overflow:hidden;
  transition:background .22s;
  animation:fadeUp .6s ease both;
}
.widget:nth-child(2){animation-delay:.08s;}
.widget:nth-child(3){animation-delay:.16s;}
.widget:hover{background:var(--hover-metal);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.widget-header{
  background:var(--metal-bar);
  padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.widget-header-title{font-family:'Cormorant Garamond',serif;font-size:0.7rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.w-dots{display:flex;gap:5px;}
.w-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.widget-body{padding:18px 18px 20px;}

/* Brand */
.brand-name{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--rg2);line-height:1;margin-bottom:14px;letter-spacing:0.08em;}
.tag-item{padding:9px 12px;border-radius:8px;background:rgba(252,232,239,0.8);border-left:3px solid var(--rg3);font-size:0.72rem;font-weight:600;color:var(--rg2);margin-bottom:7px;letter-spacing:0.06em;}

/* Calendar */
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--rg2);text-align:center;margin-bottom:12px;letter-spacing:0.1em;}
.cal-table{width:100%;border-collapse:collapse;text-align:center;}
.cal-table th{font-size:0.59rem;font-weight:600;color:var(--rg3);padding:3px 2px 7px;letter-spacing:0.1em;}
.cal-table td{padding:6px 2px;font-size:0.78rem;color:rgba(61,26,36,0.75);cursor:default;border-radius:50%;transition:color .15s;}
.cal-table td:hover:not(:empty){color:var(--rg2);}
.cal-today{background:var(--rg)!important;color:white!important;border-radius:50%!important;font-weight:700!important;box-shadow:0 2px 8px rgba(212,96,122,0.4);-webkit-text-fill-color:white!important;}

/* D-Day */
.dday-wrap{text-align:center;}
.dday-label{font-size:0.6rem;letter-spacing:0.3em;color:var(--rg3);text-transform:uppercase;margin-bottom:5px;}
.dday-num{font-family:'Cormorant Garamond',serif;font-size:3.6rem;font-weight:700;color:var(--rg2);line-height:1;margin-bottom:5px;}
.dday-since{font-size:0.6rem;font-weight:500;color:var(--text2);letter-spacing:0.2em;}

/* Now bar */
.now-bar{
  position:fixed;bottom:24px;right:28px;
  background:var(--metal-bar);color:#6a2038;
  padding:10px 22px;border-radius:50px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 6px 24px rgba(212,96,122,0.3);
  font-size:0.76rem;font-weight:700;z-index:100;
  transform:translateY(120px);transition:transform .45s cubic-bezier(0.175,.885,.32,1.275);
  max-width:300px;
}
.now-bar.visible{transform:translateY(0);}
.now-dot{width:8px;height:8px;border-radius:50%;background:#6a2038;flex-shrink:0;animation:pulse 1.3s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.now-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(212,96,122,0.25);border-radius:4px;}
</style>
</head>

<div id="yt-player" style="position:fixed;bottom:-2px;left:-2px;width:1px;height:1px;opacity:0;pointer-events:none;"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ─── Date ───
(function(){
  const n=new Date(), days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('main-date').textContent=
    `${n.getFullYear()} · ${String(n.getMonth()+1).padStart(2,'0')} · ${String(n.getDate()).padStart(2,'0')}  ${days[n.getDay()]}`;
})();

// ─── Calendar ───
function buildCal(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),today=n.getDate();
  document.getElementById('cal-month').textContent=`${y}. ${String(m+1).padStart(2,'0')}`;
  const first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  const body=document.getElementById('cal-body'); body.innerHTML='';
  let d=1;
  for(let r=0;r<6;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const td=document.createElement('td');
      if(r===0&&c<first||d>last){ td.textContent=''; }
      else{ td.textContent=d; if(d===today) td.classList.add('cal-today'); d++; }
      tr.appendChild(td);
    }
    body.appendChild(tr); if(d>last) break;
  }
}
buildCal();

// ─── D+Day ───
function updateDday(){
  const diff=Math.floor((new Date()-new Date('2024-07-27'))/864e5);
  document.getElementById('dday-num').textContent=`D+${diff}`;
}
updateDday();
(function sched(){
  const n=new Date(), t=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1);
  setTimeout(()=>{ buildCal(); updateDday(); sched(); }, t-n);
})();

// ─── Player 상태 ───
// playing: 현재 실제로 재생 중인지
// 톤암: on-record 클래스 있으면 25도(재생), 없으면 0도(정지/대기/일시정지)
let player = null;
let playerReady = false;
let tracks = [];
let cur = -1;
let playing = false;

// ─── UI 반영 ───
function setPlaying(on) {
  playing = on;
  document.getElementById('btn-play').textContent = on ? '⏸' : '▷';
  const disc = document.getElementById('record-disc');
  const arm  = document.getElementById('tonearm');
  if(on){
    disc.classList.add('spinning');
    arm.classList.add('on-record');
  } else {
    disc.classList.remove('spinning');
    arm.classList.remove('on-record');
  }
}

// ─── YouTube API 준비 ───
function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt-player', {
    height:'1', width:'1',
    playerVars:{ autoplay:0 },
    events:{
      onReady: () => {
        playerReady = true;
      },
      onStateChange: (e) => {
        // API 이벤트는 외부 요인(광고 끝, 버퍼링 등)에만 반응
        // 버튼 클릭은 setPlaying으로 즉시 처리하므로 ENDED만 여기서 처리
        if(e.data === YT.PlayerState.ENDED){
          setPlaying(false);
          playNext();
        }
      }
    }
  });
  loadFixedTracks();
}

// ─── 고정 트랙 로드 ───
async function loadFixedTracks(){
  const ids = ['EOEOe_2C6ZQ'];
  for(const id of ids){
    const info = await fetchInfo(id);
    tracks.push({ id, ...info });
  }
  renderPl();
}

async function fetchInfo(id){
  try{
    const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
    if(!r.ok) throw 0;
    const d = await r.json();
    return { title: d.title, ch: d.author_name };
  } catch {
    return { title: 'Unknown', ch: 'YouTube' };
  }
}

// ─── 플레이리스트 렌더 ───
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPl(){
  const wrap = document.getElementById('bgm-playlist');
  wrap.innerHTML = '';
  tracks.forEach((t,i) => {
    const el = document.createElement('div');
    el.className = 'pl-item' + (i===cur ? ' active' : '');
    el.innerHTML = `
      <img class="pl-thumb" src="https://img.youtube.com/vi/${esc(t.id)}/mqdefault.jpg" alt="">
      <div class="pl-info">
        <div class="pl-title">${esc(t.title)}</div>
        <div class="pl-ch">${esc(t.ch)}</div>
      </div>`;
    el.addEventListener('click', () => playTrack(i));
    wrap.appendChild(el);
  });
}

// ─── 트랙 재생 ───
function playTrack(i){
  if(!playerReady || i<0 || i>=tracks.length) return;
  cur = i;
  const t = tracks[i];
  player.loadVideoById(t.id);
  // 즉시 UI 반영 (API 이벤트 기다리지 않음)
  setPlaying(true);
  document.getElementById('bgm-title').textContent = t.title;
  document.getElementById('bgm-ch').textContent = t.ch;
  const thumb = document.getElementById('record-thumb');
  thumb.src = `https://img.youtube.com/vi/${t.id}/mqdefault.jpg`;
  thumb.style.display = 'block';
  document.getElementById('now-bar').classList.add('visible');
  document.getElementById('now-bar-title').textContent = t.title;
  renderPl();
}

function playNext(){ if(tracks.length) playTrack((cur+1) % tracks.length); }
function playPrev(){ if(tracks.length) playTrack((cur-1+tracks.length) % tracks.length); }

// ─── 버튼 이벤트 ───
document.getElementById('btn-play').addEventListener('click', () => {
  if(!playerReady || !tracks.length) return;
  if(playing){
    // ⏸ → 일시정지, 즉시 UI 반영
    player.pauseVideo();
    setPlaying(false);
  } else {
    // ▷ → 재생
    if(cur < 0) playTrack(0);
    else { player.playVideo(); setPlaying(true); }
  }
});
document.getElementById('btn-next').addEventListener('click', playNext);
document.getElementById('btn-prev').addEventListener('click', playPrev);
</script>
</body>
