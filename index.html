    <div class="resize-handle-s" onmousedown="startResize(event,'detailwin-${pid}-${noteIdx}','s')"></div>
    <div class="resize-handle-e" onmousedown="startResize(event,'detailwin-${pid}-${noteIdx}','e')"></div>
  `;
  area.appendChild(win);
}

function closeWindow(winId){
  const el = document.getElementById(winId);
  if(el){
    el.style.transition='opacity 0.18s,transform 0.18s';
    el.style.opacity='0';
    el.style.transform='scale(0.95)';
    setTimeout(()=>{ el.remove(); checkHint(); },180);
  }
}

function checkHint(){
  const area = document.querySelector('.note-page-area');
  if(!area) return;
  const wins = area.querySelectorAll('.draggable-post-window');
  const hint = document.getElementById('note-hint');
  if(hint) hint.style.display = wins.length===0?'':'none';
}

function renderNoteListInWindow(winId,pid){
  const list = document.getElementById(`note-list-${winId}`);
  if(!list) return;
  pid = pid||list.dataset.pid||currentBoardPage;
  const notes = getPosts(pid);
  if(notes.length===0){
    list.innerHTML = `<div class="note-empty">✦ 아직 게시물이 없습니다 ✦</div>`;
  } else {
    list.innerHTML='';
    notes.slice().reverse().forEach((note,revIdx)=>{
      const realIdx = notes.length-1-revIdx;
      const item = document.createElement('div');
      item.className='note-list-item';
      const hasImg = (note.attachments||[]).some(a=>a.type==='image');
      item.innerHTML=`
        <span class="note-list-item-num">${revIdx+1}</span>
        <span class="note-list-item-title">${hasImg?'🎀 ':''}${escHtml(note.title)}</span>
        <span class="note-list-item-date">${note.date}</span>
      `;
      item.onclick=()=>openDetailWindow(pid,realIdx,`postwin-${winId}`);
      list.appendChild(item);
    });
  }
  const win = document.getElementById(`postwin-${winId}`);
  if(win && !win.classList.contains('resized')) win.style.height='';
}

function refreshAllPostLists(){
  document.querySelectorAll('[id^="note-list-"]').forEach(el=>{
    const winId = el.id.replace('note-list-','');
    renderNoteListInWindow(winId);
  });
}

function handleAttach(e,winId){
  const win = document.getElementById(`writewin-${winId}`);
  if(!win) return;
  if(!win._attachments) win._attachments=[];
  const preview = document.getElementById(`attach-preview-${winId}`);
  Array.from(e.target.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const attachment={name:file.name,type:file.type.startsWith('image/')?'image':'file',data:ev.target.result};
      win._attachments.push(attachment);
      const tag = document.createElement('div');
      tag.className='attach-tag';
      if(attachment.type==='image'){
        tag.innerHTML=`<img src="${ev.target.result}" class="attach-thumb" alt="${escHtml(file.name)}"><span>${escHtml(file.name)}</span>`;
      } else {
        tag.innerHTML=`<span class="attach-file-icon">📄</span><span>${escHtml(file.name)}</span>`;
      }
      preview.appendChild(tag);
    };
    reader.readAsDataURL(file);
  });
}

function buildAttachHTML(attachments){
  if(!attachments||!attachments.length) return '';
  return `<div class="attach-row detail-attach">${attachments.map(a=>
    a.type==='image'
      ?`<div class="attach-tag"><img src="${a.data}" class="attach-thumb-lg" alt="${escHtml(a.name)}"><span>${escHtml(a.name)}</span></div>`
      :`<div class="attach-tag"><a href="${a.data}" download="${escHtml(a.name)}" class="attach-file-link"><span class="attach-file-icon">📄</span>${escHtml(a.name)}</a></div>`
  ).join('')}</div>`;
}

function submitPost(winId,pid,inputId){
  const ta = document.getElementById(`write-input-${inputId}`);
  const win = document.getElementById(winId);
  if(!ta||!win) return;
  const raw = ta.value.trim(); if(!raw) return;
  const lines = raw.split('\n');
  const title = lines[0].trim()||'(제목 없음)';
  const content = lines.slice(1).join('\n').trim();
  const notes = getPosts(pid);
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  notes.push({title,content,date:dateStr,comments:[],attachments:win._attachments||[]});
  savePosts(pid,notes);
  closeWindow(winId);
  refreshAllPostLists();
}

function startEditInDetail(pid,idx){
  const notes = getPosts(pid);
  const note = notes[idx];
  const editArea = document.getElementById(`detail-edit-area-${pid}-${idx}`);
  const viewArea = document.getElementById(`detail-view-${pid}-${idx}`);
  if(!editArea||!viewArea) return;
  if(editArea.innerHTML!==''){cancelEditInDetail(pid,idx);return;}
  viewArea.style.display='none';
  const combined = note.content?`${note.title}\n${note.content}`:note.title;
  editArea.innerHTML=`
    <div class="note-edit-box">
      <textarea class="note-edit-content" id="edit-ta-${pid}-${idx}" style="min-height:150px;">${escHtml(combined)}</textarea>
      <div class="note-edit-footer">
        <button class="note-edit-cancel" onclick="cancelEditInDetail('${pid}',${idx})">취소</button>
        <button class="note-edit-save" onclick="saveEditInDetail('${pid}',${idx})">저장 ✦</button>
      </div>
    </div>
  `;
}

function cancelEditInDetail(pid,idx){
  const editArea=document.getElementById(`detail-edit-area-${pid}-${idx}`);
  const viewArea=document.getElementById(`detail-view-${pid}-${idx}`);
  if(editArea) editArea.innerHTML='';
  if(viewArea) viewArea.style.display='';
}

function saveEditInDetail(pid,idx){
  const ta=document.getElementById(`edit-ta-${pid}-${idx}`);
  if(!ta) return;
  const lines=ta.value.trim().split('\n');
  const newTitle=lines[0].trim()||'(제목 없음)';
  const newContent=lines.slice(1).join('\n').trim();
  const notes=getPosts(pid);
  notes[idx].title=newTitle; notes[idx].content=newContent;
  savePosts(pid,notes);
  refreshAllPostLists();
  const viewDiv=document.getElementById(`detail-view-${pid}-${idx}`);
  const editArea=document.getElementById(`detail-edit-area-${pid}-${idx}`);
  if(viewDiv){
    viewDiv.querySelector('.note-detail-title').textContent=newTitle;
    viewDiv.querySelector('.note-detail-content').textContent=newContent;
    viewDiv.style.display='';
  }
  if(editArea) editArea.innerHTML='';
}

function deletePost(pid,idx){
  if(!confirm('삭제하시겠습니까?')) return;
  const notes=getPosts(pid); notes.splice(idx,1); savePosts(pid,notes);
  closeWindow(`detailwin-${pid}-${idx}`);
  refreshAllPostLists();
}

function buildCommentsHTML(pid,noteIdx,comments){
  return comments.length>0
    ?comments.map((c,ci)=>`
        <div class="note-detail-comment-item">
          <span class="note-detail-comment-text">${escHtml(c.text)}</span>
          <button class="note-detail-comment-del" onclick="deleteCommentFromWin('${pid}',${noteIdx},${ci})">✕</button>
        </div>`).join('')
    :`<div style="font-size:0.7rem;color:var(--rg3);padding:6px 0;">아직 댓글이 없습니다</div>`;
}

function submitCommentInDetail(pid,noteIdx){
  const input=document.getElementById(`ctext-${pid}-${noteIdx}`);
  if(!input) return;
  const text=input.value.trim(); if(!text) return;
  const notes=getPosts(pid);
  if(!notes[noteIdx].comments) notes[noteIdx].comments=[];
  notes[noteIdx].comments.push({text});
  savePosts(pid,notes); input.value='';
  const commentsEl=document.getElementById(`detail-comments-${pid}-${noteIdx}`);
  if(commentsEl) commentsEl.innerHTML=buildCommentsHTML(pid,noteIdx,notes[noteIdx].comments);
}

function deleteCommentFromWin(pid,noteIdx,commentIdx){
  const notes=getPosts(pid);
  if(!notes[noteIdx]||!notes[noteIdx].comments) return;
  notes[noteIdx].comments.splice(commentIdx,1); savePosts(pid,notes);
  const commentsEl=document.getElementById(`detail-comments-${pid}-${noteIdx}`);
  if(commentsEl) commentsEl.innerHTML=buildCommentsHTML(pid,noteIdx,notes[noteIdx].comments);
}

// ─── DRAG & RESIZE (post windows) ───
let dragState=null,resizeState=null;

function startDrag(e,winId){
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
  const win=document.getElementById(winId); if(!win) return;
  bringToFront(win);
  dragState={winId,startX:e.clientX,startY:e.clientY,origLeft:parseInt(win.style.left)||0,origTop:parseInt(win.style.top)||0};
  win.classList.add('dragging'); e.preventDefault();
}

function startResize(e,winId,dir){
  const win=document.getElementById(winId); if(!win) return;
  bringToFront(win);
  if(!win.classList.contains('resized')){win.style.height=win.offsetHeight+'px';win.classList.add('resized');}
  resizeState={winId,dir:dir||'se',startX:e.clientX,startY:e.clientY,origW:win.offsetWidth,origH:win.offsetHeight};
  e.preventDefault(); e.stopPropagation();
}

function bringToFront(win){
  document.querySelectorAll('.draggable-post-window').forEach(w=>{w.style.zIndex=10;});
  win.style.zIndex=30;
}

document.addEventListener('mousemove',e=>{
  if(dragState){
    const win=document.getElementById(dragState.winId); if(!win){dragState=null;return;}
    const area=document.querySelector('.note-page-area'); if(!area) return;
    let newLeft=dragState.origLeft+(e.clientX-dragState.startX);
    let newTop=dragState.origTop+(e.clientY-dragState.startY);
    newLeft=Math.max(0,Math.min(newLeft,area.offsetWidth-win.offsetWidth));
    newTop=Math.max(0,Math.min(newTop,area.offsetHeight-60));
    win.style.left=newLeft+'px'; win.style.top=newTop+'px';
  }
  if(resizeState){
    const win=document.getElementById(resizeState.winId); if(!win){resizeState=null;return;}
    const dx=e.clientX-resizeState.startX, dy=e.clientY-resizeState.startY;
    const dir=resizeState.dir;
    if(dir==='se'||dir==='e') win.style.width=Math.max(280,resizeState.origW+dx)+'px';
    if(dir==='se'||dir==='s') win.style.height=Math.max(120,resizeState.origH+dy)+'px';
  }
});

document.addEventListener('mouseup',()=>{
  if(dragState){const win=document.getElementById(dragState.winId);if(win)win.classList.remove('dragging');dragState=null;}
  resizeState=null;
});

document.addEventListener('mousedown',e=>{
  const win=e.target.closest('.draggable-post-window');
  if(win) bringToFront(win);
});

let _dragSrcIndex=null;

function refreshMenuEditList(){
  const list=document.getElementById('edit-menu-list'); if(!list) return;
  list.innerHTML='';
  userMenus.forEach((menu,index)=>{
    const row=document.createElement('div');
    row.className='setting-row';
    row.setAttribute('draggable','true');
    row.dataset.index=index;
    row.innerHTML=`
      <span class="drag-handle" title="드래그해서 순서 변경">⠿</span>
      <input type="text" class="group-input menu-group-edit" data-index="${index}" value="${menu.group}" placeholder="그룹">
      <input type="text" class="menu-name-input menu-name-edit" data-index="${index}" value="${menu.name}" placeholder="메뉴 이름">
      <button class="btn-del" onclick="removeMenuRow(${index})">✕</button>
    `;
    row.addEventListener('dragstart',e=>{_syncMenuInputs();_dragSrcIndex=index;row.classList.add('dragging-row');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging-row');document.querySelectorAll('.setting-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.setting-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>{row.classList.remove('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const targetIndex=parseInt(row.dataset.index);
      if(_dragSrcIndex===null||_dragSrcIndex===targetIndex) return;
      const moved=userMenus.splice(_dragSrcIndex,1)[0];
      userMenus.splice(targetIndex,0,moved);
      _dragSrcIndex=null;
      refreshMenuEditList();
    });
    list.appendChild(row);
  });
}

function _syncMenuInputs(){
  document.querySelectorAll('.menu-name-edit').forEach(input=>{if(userMenus[input.dataset.index])userMenus[input.dataset.index].name=input.value;});
  document.querySelectorAll('.menu-group-edit').forEach(input=>{if(userMenus[input.dataset.index])userMenus[input.dataset.index].group=input.value;});
}

function addNewMenuRow(){_syncMenuInputs();userMenus.push({id:'custom_'+Date.now(),name:'새 게시판',group:'ETC'});refreshMenuEditList();}
function removeMenuRow(index){_syncMenuInputs();userMenus.splice(index,1);refreshMenuEditList();}

// ─── Home Widget Drag/Resize ───
function saveWidgetPos(id){
  const win=document.getElementById(id); if(!win) return;
  const wpos=JSON.parse(localStorage.getItem('widgetPos')||'{}');
  wpos[id]={left:parseInt(win.style.left)||0,top:parseInt(win.style.top)||0,width:win.offsetWidth,height:win.style.height?win.offsetHeight:null};
  localStorage.setItem('widgetPos',JSON.stringify(wpos));
}

let hwDragState=null,hwResizeState=null;

function startHomeWidgetDrag(e,id){
  if(isMobileView && isMobileView()) return;
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
  const win=document.getElementById(id); if(!win) return;
  bringHomeWidgetToFront(win);
  hwDragState={id,startX:e.clientX,startY:e.clientY,origLeft:parseInt(win.style.left)||0,origTop:parseInt(win.style.top)||0};
  win.classList.add('dragging'); e.preventDefault();
}

function startHomeWidgetResize(e,id,dir){
  const win=document.getElementById(id); if(!win) return;
  bringHomeWidgetToFront(win);
  if(!win.style.height) win.style.height=win.offsetHeight+'px';
  hwResizeState={id,dir,startX:e.clientX,startY:e.clientY,origW:win.offsetWidth,origH:win.offsetHeight};
  e.preventDefault(); e.stopPropagation();
}

function bringHomeWidgetToFront(win){
  document.querySelectorAll('.draggable-widget').forEach(w=>w.style.zIndex=10);
  win.style.zIndex=30;
}

document.addEventListener('mousemove',e=>{
  if(hwDragState){
    const win=document.getElementById(hwDragState.id); if(!win){hwDragState=null;return;}
    const area=document.getElementById('home-widget-area');
    let newLeft=hwDragState.origLeft+(e.clientX-hwDragState.startX);
    let newTop=hwDragState.origTop+(e.clientY-hwDragState.startY);
    if(area){newLeft=Math.max(0,Math.min(newLeft,area.offsetWidth-win.offsetWidth));newTop=Math.max(0,newTop);}
    win.style.left=newLeft+'px'; win.style.top=newTop+'px';
  }
  if(hwResizeState){
    const win=document.getElementById(hwResizeState.id); if(!win){hwResizeState=null;return;}
    const dx=e.clientX-hwResizeState.startX, dy=e.clientY-hwResizeState.startY;
    const dir=hwResizeState.dir;
    if(dir==='se'||dir==='e') win.style.width=Math.max(180,hwResizeState.origW+dx)+'px';
    if(dir==='se'||dir==='s') win.style.height=Math.max(80,hwResizeState.origH+dy)+'px';
  }
});

document.addEventListener('mouseup',e=>{
  if(hwDragState){const win=document.getElementById(hwDragState.id);if(win){win.classList.remove('dragging');saveWidgetPos(hwDragState.id);}hwDragState=null;}
  if(hwResizeState){saveWidgetPos(hwResizeState.id);hwResizeState=null;}
});

document.addEventListener('mousedown',e=>{
  const win=e.target.closest('.draggable-widget');
  if(win) bringHomeWidgetToFront(win);
});

function getCalEvents(){return JSON.parse(localStorage.getItem('calEvents'))||{};}

let calOffset=0;
function shiftCal(delta){calOffset+=delta;buildCal();}

function renderDdayWidget(){
  const wrap=document.getElementById('dday-list'); if(!wrap) return;
  const ddays=getDdays();
  const today=new Date();today.setHours(0,0,0,0);
  wrap.innerHTML=ddays.map((dd,i)=>{
    const start=new Date(dd.date);start.setHours(0,0,0,0);
    const diff=Math.floor((today-start)/864e5);
    const disp=diff>=0?`D+${diff+1}`:`D${diff}`;
    const [y,mo,d]=dd.date.split('-');
    return `<div class="dday-item">
      <div class="dday-label">${escHtml(dd.label)}</div>
      <div class="dday-num">${disp}</div>
      <div class="dday-since">${y} · ${mo} · ${d}</div>
      <button class="dday-del-btn" onclick="deleteDday(${i})">✕</button>
    </div>`;
  }).join('');
}
function deleteDday(i){const arr=getDdays();arr.splice(i,1);saveDdays(arr);renderDdayWidget();buildCal();}

function buildCal(){
  const base=new Date();base.setDate(1);base.setMonth(base.getMonth()+calOffset);
  const y=base.getFullYear(),m=base.getMonth();
  const now=new Date();
  const todayKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const mEl=document.getElementById('cal-month'); if(!mEl) return;
  mEl.textContent=`${y}. ${String(m+1).padStart(2,'0')}`;
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const body=document.getElementById('cal-body');body.innerHTML='';
  const events=getCalEvents();
  const ddays=getDdays();
  let d=1;
  for(let r=0;r<6;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const td=document.createElement('td');
      if(r===0&&c<first||d>last){td.textContent='';}
      else{
        const day=d;
        const key=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        td.textContent=day;
        if(key===todayKey) td.classList.add('cal-today');
        if(events[key]?.length>0) td.classList.add('cal-has-event');
        if(ddays.some(dd=>dd.date===key)) td.classList.add('cal-dday-mark');
        td.onclick=()=>openCalModal(y,m+1,day,key);
        d++;
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);if(d>last) break;
  }
}

  const dayEvents=events[key]||[];

  const dow=days[new Date(y,m-1,d).getDay()];
  const ddays=getDdays();
  const existingDday=ddays.find(dd=>dd.date===key);
  const backdrop=document.createElement('div');
  backdrop.className='cal-modal-backdrop';
  backdrop.onclick=e=>{if(e.target===backdrop)backdrop.remove();};
  backdrop.innerHTML=`
    <div class="cal-modal">
      <div class="cal-modal-header">
        <span class="cal-modal-title">✦ ${y}. ${String(m).padStart(2,'0')}. ${String(d).padStart(2,'0')} (${dow})</span>
        <button class="cal-modal-close" onclick="this.closest('.cal-modal-backdrop').remove()">✕</button>
      </div>
      <div class="cal-modal-body">
        <div class="cal-modal-section-label">일정</div>
        <div class="cal-event-list" id="cal-event-list-${key}">
          ${dayEvents.length===0
            ?`<div style="font-size:0.72rem;color:var(--rg3);">일정이 없습니다</div>`
            :dayEvents.map((ev,i)=>`
              <div class="cal-event-item">
                <span>${escHtml(ev)}</span>
                <button class="cal-event-del" onclick="deleteCalEvent('${key}',${i})">✕</button>
              </div>`).join('')}
        </div>
        <div class="cal-event-add-row">
          <input class="cal-event-input" id="cal-event-input-${key}" placeholder="일정 입력..."
            onkeydown="if(event.key==='Enter') addCalEvent('${key}')">
          <button class="cal-event-add-btn" onclick="addCalEvent('${key}')">추가</button>
        </div>
        <div class="cal-modal-divider"></div>
        <div class="cal-modal-section-label">D-Day</div>
        ${existingDday
          ?`<div class="cal-dday-exists">
               <span>✦ ${escHtml(existingDday.label)}</span>
               <button class="cal-event-del" onclick="deleteDdayByKey('${key}');this.closest('.cal-modal-backdrop').remove()">✕</button>
             </div>`
          :`<div class="cal-event-add-row">

               <button class="cal-event-add-btn" onclick="addDdayFromCal('${key}')">추가</button>
             </div>`
        }
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  setTimeout(()=>document.getElementById(`cal-event-input-${key}`)?.focus(),50);
}

  const input=document.getElementById(`dday-name-${key}`);

  const arr=getDdays();arr.push({label,date:key});saveDdays(arr);
  renderDdayWidget();buildCal();
  document.querySelector('.cal-modal-backdrop')?.remove();

function deleteDdayByKey(key){const arr=getDdays().filter(dd=>dd.date!==key);saveDdays(arr);renderDdayWidget();buildCal();}

async function runAiSched(){
  const text=document.getElementById('ai-sched-text')?.value.trim();
  const resultEl=document.getElementById('ai-sched-result');
  if(!text&&!_aiImgBase64){resultEl.innerHTML=`<p style="font-size:0.72rem;color:var(--rg3);">텍스트나 이미지를 입력해주세요.</p>`;return;}
  resultEl.innerHTML=`<div class="ai-sched-loading">✦ 분석 중...</div>`;
  document.querySelector('.ai-sched-run-btn').disabled=true;
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const userContent=[];
  if(_aiImgBase64) userContent.push({type:'image',source:{type:'base64',media_type:_aiImgType,data:_aiImgBase64}});
  userContent.push({type:'text',text:`오늘 날짜는 ${todayStr}입니다. 아래 내용에서 일정을 추출해서 반드시 JSON 배열만 반환하세요. 다른 텍스트 없이 JSON만.\n형식: [{"date":"YYYY-MM-DD","event":"일정 내용"}, ...]\n\n${text||''}`});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:userContent}]})
    });
    const data=await res.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const schedules=JSON.parse(raw);
    if(!schedules.length){resultEl.innerHTML=`<p style="font-size:0.72rem;color:var(--rg3);">일정을 찾지 못했어요.</p>`;return;}
    resultEl.innerHTML=`
      <div class="cal-modal-section-label" style="margin-top:12px;">추출된 일정</div>
      ${schedules.map((s,i)=>`
        <div class="ai-sched-item" id="ai-item-${i}">
          <div class="ai-sched-item-info">
            <span class="ai-sched-date">${s.date}</span>
            <span class="ai-sched-event">${escHtml(s.event)}</span>
          </div>
          <button class="ai-sched-add-btn" onclick="addAiSched('${s.date}','${s.event.replace(/'/g,"\\'")}',${i})">+ 추가</button>
        </div>`).join('')}
      <button class="ai-sched-addall-btn" onclick="addAllAiSched(${JSON.stringify(schedules).replace(/"/g,'&quot;')})">전체 추가 ✦</button>`;
  }catch(err){
    resultEl.innerHTML=`<p style="font-size:0.72rem;color:var(--rg3);">오류가 발생했어요. 다시 시도해주세요.</p>`;
  }
  document.querySelector('.ai-sched-run-btn').disabled=false;
}

function addAiSched(date,event,idx){
  const events=getCalEvents();
  if(!events[date]) events[date]=[];
  events[date].push(event); saveCalEvents(events); buildCal();
  const btn=document.querySelector(`#ai-item-${idx} .ai-sched-add-btn`);
  if(btn){btn.textContent='✓';btn.disabled=true;btn.style.background='rgba(212,96,122,0.15)';}
}
function addAllAiSched(schedules){
  const events=getCalEvents();
  schedules.forEach(s=>{if(!events[s.date])events[s.date]=[];events[s.date].push(s.event);});
  saveCalEvents(events);buildCal();
  document.querySelectorAll('.ai-sched-add-btn').forEach(btn=>{btn.textContent='✓';btn.disabled=true;});
  document.querySelector('.ai-sched-addall-btn').textContent='✓ 전체 추가됨';
}

let player=null,playerReady=false,tracks=[],cur=-1,playing=false;

function getCustomTracks(){
  const saved = localStorage.getItem('bgmTracks');
  if(saved) try{ return JSON.parse(saved); } catch(e){}
  return ['EOEOe_2C6ZQ','QfIdY_Vl_vU'];
}
function saveCustomTracks(ids){ localStorage.setItem('bgmTracks', JSON.stringify(ids)); }

function extractYtId(input){
  input = input.trim();
  // Full URL patterns
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/
  ];
  for(const p of patterns){ const m = input.match(p); if(m) return m[1]; }
  return null;
}

function renderBgmTrackSettings(){
  const list = document.getElementById('bgm-track-list');
  if(!list) return;
  const ids = getCustomTracks();
  if(ids.length === 0){
    list.innerHTML = `<div style="font-size:0.72rem;color:var(--rg3);text-align:center;padding:10px 0;">트랙이 없습니다</div>`;
    return;
  }
  list.innerHTML = ids.map((id,i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:rgba(252,232,239,0.5);border:1px solid var(--border);margin-bottom:6px;">
      <span style="font-size:0.7rem;font-weight:800;color:var(--rg3);min-width:18px;">${i+1}</span>
      <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="flex:1;font-size:0.75rem;color:var(--rg2);font-weight:600;text-decoration:none;font-family:'Pretendard',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">youtu.be/${id}</a>
      <button onclick="removeBgmTrack(${i})" style="background:none;border:none;color:var(--rg3);cursor:pointer;font-size:0.8rem;opacity:0.5;transition:opacity .2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">✕</button>
    </div>`).join('');
}

function addBgmTrack(){
  const input = document.getElementById('bgm-add-input');
  if(!input) return;
  const id = extractYtId(input.value);
  if(!id){ alert('유효한 유튜브 URL 또는 영상 ID를 입력해주세요.'); return; }
  const ids = getCustomTracks();
  if(ids.includes(id)){ alert('이미 추가된 트랙입니다.'); return; }
  ids.push(id);
  saveCustomTracks(ids);
  input.value = '';
  renderBgmTrackSettings();
}

function removeBgmTrack(i){
  const ids = getCustomTracks();
  ids.splice(i,1);
  saveCustomTracks(ids);
  renderBgmTrackSettings();
}

function saveBgmTracks(){
  // Already auto-saved on add/remove; reload tracks into player
  tracks = [];
  cur = -1;
  loadTracksFromStorage().then(() => {
    alert('BGM 저장 완료! 재생목록이 업데이트됐습니다.');
  });
}

async function loadTracksFromStorage(){
  const ids = getCustomTracks();
  tracks = [];
  for(const id of ids){
    try{
      const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      const d=await r.json();
      tracks.push({id,title:d.title,ch:d.author_name});
    } catch{
      tracks.push({id,title:'Track '+id.substring(0,6)+'…',ch:'YouTube'});
    }
  }
}

function onYouTubeIframeAPIReady(){
  player=new YT.Player('yt-player',{height:'1',width:'1',playerVars:{autoplay:0},
    events:{onReady:()=>{playerReady=true;loadTracksFromStorage();},onStateChange:e=>{if(e.data===YT.PlayerState.ENDED)playNext();}}}
  );
}
function playTrack(i){
  if(!playerReady||i<0||i>=tracks.length) return;
  cur=i;const t=tracks[i];player.loadVideoById(t.id);setPlaying(true);
  document.getElementById('bgm-title').textContent=t.title;
  document.getElementById('bgm-ch').textContent=t.ch;
  const mt=document.getElementById('bgm-mini-title');
  if(mt) mt.textContent=t.title;
}
function setPlaying(on){
  playing=on;
  document.getElementById('btn-play').textContent=on?'⏸':'▷';
  const disc=document.getElementById('record-disc');
  on?disc.classList.add('spinning'):disc.classList.remove('spinning');
  const md=document.getElementById('bgm-mini-disc');
  if(md) on?md.classList.add('spinning'):md.classList.remove('spinning');
  const mp=document.getElementById('bgm-mini-play');
  if(mp) mp.textContent=on?'⏸':'▷';
}
function togglePlay(){
  if(!playerReady||!tracks.length) return;
  if(playing){player.pauseVideo();setPlaying(false);}
  else{cur<0?playTrack(0):(player.playVideo(),setPlaying(true));}
}
function playNext(){if(tracks.length)playTrack((cur+1)%tracks.length);}
function playPrev(){if(tracks.length)playTrack((cur-1+tracks.length)%tracks.length);}

document.getElementById('btn-play').onclick=()=>{
  if(!playerReady||!tracks.length) return;
  if(playing){player.pauseVideo();setPlaying(false);}
  else{cur<0?playTrack(0):(player.playVideo(),setPlaying(true));}
};
document.getElementById('btn-next').onclick=playNext;
document.getElementById('btn-prev').onclick=playPrev;

(function(){
  const bgm=document.querySelector('.bgm-widget');
  const header=bgm.querySelector('.bgm-header');
  let bDrag=null;
  header.addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON') return;
    const rect=bgm.getBoundingClientRect();
    bDrag={startX:e.clientX,startY:e.clientY,origLeft:rect.left,origTop:rect.top};
    bgm.style.right='auto';bgm.style.bottom='auto';
    bgm.style.left=rect.left+'px';bgm.style.top=rect.top+'px';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!bDrag) return;
    let newLeft=bDrag.origLeft+(e.clientX-bDrag.startX);
    let newTop=bDrag.origTop+(e.clientY-bDrag.startY);
    newLeft=Math.max(0,Math.min(newLeft,window.innerWidth-bgm.offsetWidth));
    newTop=Math.max(0,Math.min(newTop,window.innerHeight-bgm.offsetHeight));
    bgm.style.left=newLeft+'px';bgm.style.top=newTop+'px';
  });
  document.addEventListener('mouseup',()=>{bDrag=null;});
})();

const LOCK_PW = '6942';
(function initLock(){
  // 세션 동안 해제되면 유지
  if(sessionStorage.getItem('unlocked') === '1'){
    document.getElementById('lock-screen').style.display = 'none';
    return;
  }
  // 잠금 화면 표시 상태에서 사이트 콘텐츠 숨기기
  document.querySelector('.site-wrap').style.visibility = 'hidden';
  const bgm = document.querySelector('.bgm-widget');
  if(bgm) bgm.style.visibility = 'hidden';
})();

function tryUnlock(){
  const input = document.getElementById('lock-input');
  const errEl = document.getElementById('lock-error');
  if(input.value === LOCK_PW){
    sessionStorage.setItem('unlocked','1');
    const lock = document.getElementById('lock-screen');
    lock.style.transition = 'opacity 0.5s';
    lock.style.opacity = '0';
    setTimeout(()=>{
      lock.style.display = 'none';
      document.querySelector('.site-wrap').style.visibility = '';
      const bgm = document.querySelector('.bgm-widget');
      if(bgm) bgm.style.visibility = '';
    }, 500);
    errEl.textContent = '';
  } else {
    errEl.textContent = '비밀번호가 올바르지 않습니다.';
    input.classList.remove('shake');
    void input.offsetWidth; // reflow
    input.classList.add('shake');
    input.value = '';
    setTimeout(()=>input.classList.remove('shake'), 500);
  }
}

function applyHeaderSettings(){
  const img   = document.getElementById('header-logo-img');
  const txt   = document.getElementById('header-custom-text');
  const hdr   = document.getElementById('main-header');

  // 로고
  const logoSrc = localStorage.getItem('headerLogo') || localStorage.getItem('headerLogoUrl') || 'https://i.imgur.com/LRiQoHK.png';
  const logoH   = localStorage.getItem('headerLogoHeight') || '62';
  if(img){ img.src = logoSrc; img.style.height = logoH + 'px'; }

  // 배경색
  const bg = localStorage.getItem('headerBgColor');
  if(hdr && bg) hdr.style.background = bg;

  // 문구
  const text = localStorage.getItem('headerText') || '';
  if(txt){
    txt.textContent = text;
    txt.style.display = text ? 'block' : 'none';
  }
}

// 실시간 미리보기 함수들
function hdPreviewFile(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    const prev = document.getElementById('hd-preview-img');
    if(prev) prev.src = src;
    // 임시 저장 (base64)
    window._hdTempBase64 = src;
    window._hdTempUrl = null;
  };
  reader.readAsDataURL(file);
}
function hdPreviewUrl(val){
  if(!val) return;
  const prev = document.getElementById('hd-preview-img');
  if(prev) prev.src = val;
  window._hdTempUrl = val;
  window._hdTempBase64 = null;
}
function hdPreviewHeight(val){
  document.getElementById('hd-height-val').textContent = val + 'px';
  const prev = document.getElementById('hd-preview-img');
  if(prev) prev.style.height = val + 'px';
}
function hdPreviewText(val){
  const prev = document.getElementById('hd-preview-text');
  if(prev) prev.textContent = val;
}
function hdPreviewBg(val){
  document.getElementById('main-header').style.background = val;
}
function hdResetLogo(){
  const def = 'https://i.imgur.com/LRiQoHK.png';
  window._hdTempBase64 = null; window._hdTempUrl = null;
  const prev = document.getElementById('hd-preview-img');
  if(prev) prev.src = def;
  const urlInput = document.getElementById('hd-url-input');
  if(urlInput) urlInput.value = '';
}
function hdResetBg(){
  document.getElementById('main-header').style.background = '';
  const picker = document.getElementById('hd-bg-color');
  if(picker) picker.value = '#ffffff';
  localStorage.removeItem('headerBgColor');
}
function saveHeaderSettings(){
  // 로고 소스 결정
  if(window._hdTempBase64){
    localStorage.setItem('headerLogo', window._hdTempBase64);
    localStorage.removeItem('headerLogoUrl');
  } else if(window._hdTempUrl){
    localStorage.setItem('headerLogoUrl', window._hdTempUrl);
    localStorage.removeItem('headerLogo');
  } else if(!localStorage.getItem('headerLogo') && !localStorage.getItem('headerLogoUrl')){
    // 변경 없음
  }
  // 높이
  const h = document.getElementById('hd-height-range')?.value;
  if(h) localStorage.setItem('headerLogoHeight', h);
  // 배경
  const bg = document.getElementById('hd-bg-color')?.value;
  if(bg && bg !== '#ffffff') localStorage.setItem('headerBgColor', bg);
  // 문구
  const text = document.getElementById('hd-text-input')?.value || '';
  localStorage.setItem('headerText', text);

  applyHeaderSettings();

  // 저장 확인 버튼 피드백
  const btn = event.currentTarget || event.target;
  const orig = btn.textContent;
  btn.textContent = '저장됨 ✓';
  setTimeout(()=>btn.textContent = orig, 1500);
}

function renderHabitGrid(){
  const area=document.getElementById('habit-grid-area'); if(!area) return;
  const habits=getHabits(), logs=getHabitLogs();
  const now=new Date(), year=now.getFullYear(), month=now.getMonth(), days=new Date(year,month+1,0).getDate(), today=now.getDate();
  const lbl=document.getElementById('habit-month-label'); if(lbl) lbl.textContent=`${year}.${String(month+1).padStart(2,'0')}`;
  if(!habits.length){ area.innerHTML=`<div style="font-size:0.72rem;color:var(--rg3);text-align:center;padding:20px;">습관을 먼저 추가해주세요.</div>`; renderHabitManage(); return; }
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;overflow-x:auto;"><div style="min-width:76px;flex-shrink:0;"></div><div style="display:flex;gap:3px;">`;
  for(let d=1;d<=days;d++) html+=`<div style="width:13px;font-size:0.44rem;text-align:center;color:${d===today?'var(--rg)':'rgba(212,96,122,0.3)'};">${d}</div>`;
  html+=`</div></div>`;
  habits.forEach(h=>{
    const key=`${year}-${month}`, dayMap=((logs[h.id]||{})[key])||{};
    let streak=0; for(let d=today;d>=1;d--){ if(dayMap[d]) streak++; else break; }
    html+=`<div class="habit-row" style="overflow-x:auto;">
      <div class="habit-name" title="${escHtml(h.name)}">${escHtml(h.name)}</div>
      <div class="habit-cells">`;
    for(let d=1;d<=days;d++){
      const done=dayMap[d]?'d4':'', fut=d>today?'style="opacity:0.25;cursor:default;"':'';
      html+=`<button class="habit-cell ${done}" ${fut} onclick="${d<=today?`toggleHabit('${h.id}',${year},${month},${d})`:''}"></button>`;
    }
    html+=`</div><div class="habit-streak">${streak>0?'🔥'+streak:''}</div>
      <button class="habit-del-btn" onclick="deleteHabit('${h.id}')">✕</button></div>`;
  });
  area.innerHTML=html; renderHabitManage();
}
function renderHabitManage(){
  const list=document.getElementById('habit-manage-list'); if(!list) return;
  const habits=getHabits();
  list.innerHTML=habits.map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed rgba(212,96,122,0.1);">
    <span style="font-size:0.78rem;color:var(--text);flex:1;">${escHtml(h.name)}</span>
    <button class="fp-btn-ghost" onclick="deleteHabit('${h.id}')">삭제</button></div>`).join('');
}
function toggleHabit(id,year,month,day){
  const logs=getHabitLogs(), key=`${year}-${month}`;
  if(!logs[id])logs[id]={}; if(!logs[id][key])logs[id][key]={};
  logs[id][key][day]=!logs[id][key][day]; saveHabitLogs(logs); renderHabitGrid();
}
function addHabit(){
  const inp=document.getElementById('habit-new-input'); if(!inp) return;
  const name=inp.value.trim(); if(!name) return;
  const habits=getHabits(); habits.push({id:'h_'+Date.now(),name}); saveHabits(habits); inp.value=''; renderHabitGrid();
}
function deleteHabit(id){ saveHabits(getHabits().filter(h=>h.id!==id)); renderHabitGrid(); }

function selectMood(v){ _moodSel=v; document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.v)===v)); }
function saveMoodEntry(){
  const errEl=document.getElementById('mood-error');

function wrGetWeekStr(){
  const now=new Date(), day=now.getDay(), mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  return `${fmt(mon)} ~ ${fmt(sun)}`;
}
function wrSetWeekLabel(){ const l=document.getElementById('wr-week-label'); if(l) l.textContent=wrGetWeekStr(); }
function saveWeekly(){
  const wins=document.getElementById('wr-wins')?.value.trim()||'';
  const improve=document.getElementById('wr-improve')?.value.trim()||'';
  const next=document.getElementById('wr-next')?.value.trim()||'';
  const free=document.getElementById('wr-free')?.value.trim()||'';
  if(!wins&&!improve&&!next){ alert('최소 하나는 입력해주세요.'); return; }
  const weeklies=getWeeklies(), week=wrGetWeekStr();
  const idx=weeklies.findIndex(w=>w.week===week);
  const rec={id:_wrCurrentId||'wr_'+Date.now(),week,wins,improve,next,free};
  if(idx>=0) weeklies[idx]=rec; else weeklies.push(rec);
  saveWeeklies(weeklies); _wrCurrentId=rec.id; renderWrHistory();

function getGrowthMetrics(){ return JSON.parse(localStorage.getItem('growthMetrics')||'[]'); }
function saveGrowthMetrics(a){ localStorage.setItem('growthMetrics',JSON.stringify(a)); }
function renderGrowthPage(container){
  const page=document.createElement('div'); page.className='feature-page';
  page.innerHTML=`
    <div><div class="feature-page-title">✦ 성장 지표</div>
    <div style="font-size:0.65rem;color:var(--text2);margin-top:4px;">수치를 쌓으면 꺾은선 그래프로 시각화됩니다.</div></div>
    <div class="feature-section"><div class="feature-section-header"><span class="feature-section-title">지표 추가</span></div>

      </div></div>
    </div>

function renderGrowthMetrics(){
  const area=document.getElementById('growth-metrics-area'); if(!area) return;
  const metrics=getGrowthMetrics();
  if(!metrics.length){ area.innerHTML=`<div style="font-size:0.72rem;color:var(--rg3);text-align:center;padding:20px;">지표를 먼저 추가해주세요.</div>`; return; }
  area.innerHTML=metrics.map((m,mi)=>{
    const entries=m.entries||[], chips=entries.map((e,ei)=>`<div class="growth-chip">${e.date} · ${e.val}${escHtml(m.unit||'')}<button onclick="deleteGrowthEntry(${mi},${ei})">✕</button></div>`).join('');
    const svg=growthSvg(entries,mi);
    return `<div class="feature-section"><div class="feature-section-header">
      <span class="feature-section-title">${escHtml(m.name)} <span style="font-size:0.62rem;color:var(--rg3);">${escHtml(m.unit||'')}</span></span>
      <button class="fp-btn-ghost" onclick="deleteGrowthMetric(${mi})" style="font-size:0.6rem;">삭제</button></div>
      <div class="feature-section-body">${svg}<div class="growth-chips">${chips||'<span style="font-size:0.65rem;color:var(--rg3);">아직 데이터가 없습니다.</span>'}</div>
        <div class="growth-add-row"><input class="growth-val-inp" id="growth-val-${mi}" type="number" placeholder="값">
          <input class="fp-input" id="growth-date-${mi}" type="date" value="${new Date().toISOString().split('T')[0]}" style="width:130px;">
          <button class="fp-btn" onclick="addGrowthEntry(${mi})">+ 추가</button>
        </div>
      </div>
    </div>`;}).join('');
}
function growthSvg(entries,mi){
  if(entries.length<2) return `<div style="font-size:0.65rem;color:var(--rg3);padding:8px 0;">데이터 2개 이상이면 그래프가 표시됩니다.</div>`;
  const s=[...entries].sort((a,b)=>a.date>b.date?1:-1), vals=s.map(e=>parseFloat(e.val)||0);
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const W=300, H=68, pad=8;
  const pts=s.map((_,i)=>[(pad+(i/(s.length-1))*(W-pad*2)).toFixed(1),(H-pad-((vals[i]-mn)/rng)*(H-pad*2)).toFixed(1)]);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area=line+` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#d4607a" stroke="white" stroke-width="1.5"><title>${s[i].date}: ${s[i].val}</title></circle>`).join('');
  return `<svg class="growth-svg" viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="gg${mi}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8829a" stop-opacity="0.45"/><stop offset="100%" stop-color="#e8829a" stop-opacity="0.02"/></linearGradient></defs>
    <path d="${area}" fill="url(#gg${mi})"/><path d="${line}" fill="none" stroke="#d4607a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}
function addGrowthMetric(){
  const name=document.getElementById('growth-new-name')?.value.trim(), unit=document.getElementById('growth-new-unit')?.value.trim();
  if(!name) return; const m=getGrowthMetrics(); m.push({id:'gm_'+Date.now(),name,unit,entries:[]});
  saveGrowthMetrics(m); document.getElementById('growth-new-name').value=''; document.getElementById('growth-new-unit').value=''; renderGrowthMetrics();
}
function addGrowthEntry(mi){
  const val=document.getElementById(`growth-val-${mi}`)?.value.trim(), date=document.getElementById(`growth-date-${mi}`)?.value;
  if(!val||!date) return; const m=getGrowthMetrics(); if(!m[mi]) return;
  if(!m[mi].entries) m[mi].entries=[]; m[mi].entries.push({date,val:parseFloat(val)}); saveGrowthMetrics(m); renderGrowthMetrics();
}
function deleteGrowthEntry(mi,ei){ const m=getGrowthMetrics(); if(m[mi]){m[mi].entries.splice(ei,1);saveGrowthMetrics(m);renderGrowthMetrics();} }
function deleteGrowthMetric(mi){ const m=getGrowthMetrics(); m.splice(mi,1); saveGrowthMetrics(m); renderGrowthMetrics(); }

const POMO_MODES={focus:{label:'집중',min:25},short:{label:'짧은 휴식',min:5},long:{label:'긴 휴식',min:15}};
let _pomoState={mode:'focus',running:false,remaining:25*60,sessions:0,interval:null,task:''};

              <circle class="pomo-ring-bg" cx="${C}" cy="${C}" r="${R}"/>

        <div class="pomo-log" id="pomo-log"></div>
      </div>
    </div>`;
  container.appendChild(page); pomoUpdateUI(); renderPomoLog();
}
function pomoFmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function pomoUpdateUI(){
  const t=document.getElementById('pomo-time'); if(t) t.textContent=pomoFmt(_pomoState.remaining);
  const lbl=document.getElementById('pomo-mode-lbl'); if(lbl) lbl.textContent=POMO_MODES[_pomoState.mode].label.toUpperCase();
  const ring=document.getElementById('pomo-ring');
  if(ring){ const total=POMO_MODES[_pomoState.mode].min*60, C=78, R=66, circ=2*Math.PI*R; ring.style.strokeDashoffset=(circ*(1-_pomoState.remaining/total)).toFixed(1); }
  const btn=document.getElementById('pomo-play-btn'); if(btn) btn.textContent=_pomoState.running?'⏸':'▷';
  const dots=document.getElementById('pomo-dots');
  if(dots) dots.innerHTML=Array.from({length:4},(_,i)=>`<div class="pomo-dot ${i<(_pomoState.sessions%4)?'done':''}"></div>`).join('');
  ['focus','short','long'].forEach(m=>{ const tab=document.getElementById('pt-'+m); if(tab) tab.classList.toggle('active',_pomoState.mode===m); });
}
function pomoToggle(){
  if(_pomoState.running){ clearInterval(_pomoState.interval); _pomoState.running=false; }
  else {
    _pomoState.running=true;
    _pomoState.interval=setInterval(()=>{
      _pomoState.remaining--;
      pomoUpdateUI();
      if(_pomoState.remaining<=0){
        clearInterval(_pomoState.interval); _pomoState.running=false;
        if(_pomoState.mode==='focus'){ _pomoState.sessions++; pomoAddLog(_pomoState.task||'집중 세션','focus'); pomoSetMode(_pomoState.sessions%4===0?'long':'short'); }
        else { pomoSetMode('focus'); }
      }
    },1000);
  }
  pomoUpdateUI();
}
function pomoSetMode(mode){ clearInterval(_pomoState.interval); _pomoState.running=false; _pomoState.mode=mode; _pomoState.remaining=POMO_MODES[mode].min*60; pomoUpdateUI(); }
function pomoReset(){ clearInterval(_pomoState.interval); _pomoState.running=false; _pomoState.remaining=POMO_MODES[_pomoState.mode].min*60; pomoUpdateUI(); }
function pomoSkip(){ clearInterval(_pomoState.interval); _pomoState.running=false; _pomoState.remaining=0; pomoUpdateUI(); }
function pomoAddLog(task,type){

// ✦ 홈 위젯 포모도로 (wp*)  — 페이지 탭과 독립 상태
// ════════════════════════════════════════════════════════
const WP_MODES={focus:{label:'FOCUS',min:25},short:{label:'BREAK',min:5},long:{label:'LONG',min:15}};
const _wp={mode:'focus',running:false,remaining:25*60,sessions:0,interval:null};

function wpFmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function wpUpdateUI(){
  const t=document.getElementById('wp-time'); if(t) t.textContent=wpFmt(_wp.remaining);
  const lbl=document.getElementById('wp-lbl'); if(lbl) lbl.textContent=WP_MODES[_wp.mode].label;
  const btn=document.getElementById('wp-play-btn'); if(btn) btn.textContent=_wp.running?'⏸':'▷';
  const ring=document.getElementById('wp-ring');
  if(ring){
    const C=54, R=46, circ=2*Math.PI*R, total=WP_MODES[_wp.mode].min*60;
    ring.style.strokeDashoffset=(circ*(1-_wp.remaining/total)).toFixed(1);
  }
  const dots=document.getElementById('wp-dots');
  if(dots) dots.innerHTML=Array.from({length:4},(_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<(_wp.sessions%4)?'#d4607a':'rgba(212,96,122,0.13)'};transition:background 0.2s;"></div>`).join('');
  ['focus','short','long'].forEach(m=>{ const tab=document.getElementById('wpt-'+m); if(tab) tab.classList.toggle('active',_wp.mode===m); });
  const cnt=document.getElementById('wp-session-count');
  if(cnt) cnt.textContent=_wp.sessions>0?`완료 ${_wp.sessions}세션`:'';
  // title bar도 실시간 표시
  if(_wp.running) document.title=`${wpFmt(_wp.remaining)} · DOXX4E`;
  else document.title='DOXX4E';
}

function wpToggle(){
  if(_wp.running){ clearInterval(_wp.interval); _wp.running=false; }
  else {
    _wp.running=true;
    _wp.interval=setInterval(()=>{
      _wp.remaining--;
      wpUpdateUI();
      if(_wp.remaining<=0){
        clearInterval(_wp.interval); _wp.running=false;
        if(_wp.mode==='focus'){
          _wp.sessions++;
          const task=document.getElementById('wp-task')?.value||'집중 세션';
          pomoAddLog(task,'focus');
          wpSetMode(_wp.sessions%4===0?'long':'short');
        } else { wpSetMode('focus'); }
        // 알림 시도
        try{ if(Notification.permission==='granted') new Notification('DOXX4E',{body:_wp.mode==='focus'?'집중 완료! 휴식하세요 ☕':'다시 집중할 시간 🍅'}); }catch(e){}
      }
    },1000);
  }
  wpUpdateUI();
}
function wpSetMode(mode){
  clearInterval(_wp.interval); _wp.running=false;
  _wp.mode=mode; _wp.remaining=WP_MODES[mode].min*60;
  wpUpdateUI();
}
function wpReset(){ clearInterval(_wp.interval); _wp.running=false; _wp.remaining=WP_MODES[_wp.mode].min*60; wpUpdateUI(); }
function wpSkip(){ clearInterval(_wp.interval); _wp.running=false; _wp.remaining=0; wpUpdateUI(); }

applyHeaderSettings();

renderSidebar();
loadPage('profile');
</script>
