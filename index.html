<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOXX4E</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root {
  --metal-bar: linear-gradient(90deg, #f0a0bc 0%, #f5b0c8 20%, #f8c0d4 40%, #f5b0c8 60%, #ffffff 75%, #f5b0c8 85%, #f0a0bc 100%);
  --hover-metal: linear-gradient(90deg, #fad4e4 0%, #fde0ec 40%, #fde8f2 60%, #ffffff 75%, #fde0ec 85%, #fad4e4 100%);
  --rg: #d4607a;
  --rg2: #b5405e;
  --rg3: #e8829a;
  --text: #3d1a24;
  --text2: #8a4a5a;
  --border: rgba(212,96,122,0.18);
  --white: #fff8fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;font-family:'Pretendard',sans-serif;
  background:#fce8ef;
  background-image: radial-gradient(ellipse at 15% 10%, rgba(255,182,210,0.4) 0%, transparent 50%), radial-gradient(ellipse at 85% 80%, rgba(232,130,154,0.2) 0%, transparent 45%);
}

/* ─── LAYOUT ─── */
.site-wrap{display:flex;min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:180px;flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-logo{padding:22px 16px 16px;border-bottom:1px solid var(--border);}
.logo-text{font-family:'Cormorant Garamond', serif;font-size:1.8rem;font-weight:700;color:var(--rg2);letter-spacing:0.08em;line-height:1;}
.logo-sub{font-size:0.58rem;letter-spacing:0.28em;color:var(--text2);margin-top:3px;text-transform:uppercase;font-family:'Pretendard',sans-serif;font-weight:700;}
.nav-group-label{font-size:0.57rem;letter-spacing:0.26em;color:var(--rg3);text-transform:uppercase;padding:12px 16px 3px;font-weight:800;font-family:'Pretendard',sans-serif;}

.nav-item {
  display: block;
  padding: 10px 16px 10px 22px;
  font-size: 0.77rem;
  color: var(--text2);
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: all 0.3s ease;
  border-left: 3px solid transparent;
  cursor: pointer;
  margin: 1px 0;
}

.nav-item:hover, .btn-add-menu:hover{
  color: var(--rg2);
  background: var(--hover-metal);
  border-left-color: var(--rg);
  font-weight: 500;
}

/* ─── BGM WIDGET ─── */
.bgm-widget{
  position: fixed; bottom: 24px; right: 28px; z-index: 150;
  width: 220px; border-radius: 16px; overflow: hidden;
  border: 1px solid var(--border); background: var(--white);
  box-shadow: 0 6px 28px rgba(212,96,122,0.22);
}
.bgm-header{ background:var(--metal-bar); padding:7px 11px; display:flex;align-items:center;justify-content:space-between; }
.bgm-header-title{font-family:'Cormorant Garamond', serif;font-size:0.72rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.bgm-dots{display:flex;gap:4px;}
.bgm-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.bgm-body{padding:14px 14px 18px;}
.record-scene{
  position:relative; width:100px; height:100px;
  margin:0 auto 12px;
  display:flex; align-items:center; justify-content:center;
}
.record-disc{
  width:100px; height:100px; border-radius:50%;
  background:
    radial-gradient(circle,#2a0c18 0% 11%,transparent 11%),
    radial-gradient(circle,#1e0810 0% 13%,transparent 13%),
    radial-gradient(circle,#2a0c18 0% 22%,transparent 22%),
    radial-gradient(circle,#1e0810 0% 24%,transparent 24%),
    radial-gradient(circle,#2a0c18 0% 38%,transparent 38%),
    radial-gradient(circle,#1e0810 0% 40%,transparent 40%),
    conic-gradient(from 0deg,
      #180810 0deg,#22101a 9deg,#180810 18deg,#22101a 27deg,
      #180810 36deg,#22101a 45deg,#180810 54deg,#22101a 63deg,
      #180810 72deg,#22101a 81deg,#180810 90deg,#22101a 99deg,
      #180810 108deg,#22101a 117deg,#180810 126deg,#22101a 135deg,
      #180810 144deg,#22101a 153deg,#180810 162deg,#22101a 171deg,
      #180810 180deg,#22101a 189deg,#180810 198deg,#22101a 207deg,
      #180810 216deg,#22101a 225deg,#180810 234deg,#22101a 243deg,
      #180810 252deg,#22101a 261deg,#180810 270deg,#22101a 279deg,
      #180810 288deg,#22101a 297deg,#180810 306deg,#22101a 315deg,
      #180810 324deg,#22101a 333deg,#180810 342deg,#22101a 351deg,
      #180810 360deg);
  box-shadow:0 0 0 2px #3a1020, 0 5px 18px rgba(0,0,0,0.45);
  position:relative; flex-shrink:0;
}
.record-disc.spinning{animation:vinylSpin 2.8s linear infinite;}
@keyframes vinylSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.record-label{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:34px; height:34px; border-radius:50%;
  background:var(--metal-bar);
  box-shadow:0 0 0 1.5px rgba(200,80,120,0.5);
  z-index:2; overflow:hidden;
}
.record-label-thumb{width:100%;height:100%;border-radius:50%;object-fit:cover;display:none;opacity:0.88;}
.record-hole{
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:6px; height:6px; border-radius:50%;
  background:#180810; z-index:5;
}
.bgm-info{text-align:center;margin-bottom:10px;}
.bgm-track-title{font-size:0.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.bgm-track-channel{font-size:0.6rem;color:var(--text2);}
.bgm-controls{display:flex;justify-content:center;gap:8px;align-items:center;}
.bgm-btn{ width:28px;height:28px;border-radius:50%; border:1px solid var(--border);background:var(--white); color:var(--rg2);font-size:0.65rem;cursor:pointer; display:flex;align-items:center;justify-content:center; transition:background .18s;line-height:1;padding:0;flex-shrink:0; }
.bgm-btn.play-btn{ width:34px;height:34px;font-size:0.95rem; background:var(--metal-bar);color:#6a2038; border:none;box-shadow:0 2px 8px rgba(212,96,122,0.25); }

/* ─── MAIN ─── */
.main{flex:1;padding:34px 30px;overflow-y:auto;}
.main-header{margin-bottom:26px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.main-title{font-family:'Cormorant Garamond', serif;font-size:2.4rem;font-weight:700;color:var(--rg2);letter-spacing:0.06em;margin-bottom:4px;}
.main-date{font-size:0.7rem;color:var(--text2);letter-spacing:0.12em;}

.widget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px; padding-bottom: 80px;}
.widget{ background:var(--white);border-radius:14px; border:1px solid var(--border); box-shadow:0 2px 10px rgba(212,96,122,0.08); overflow:hidden; animation:fadeUp .6s ease both; }
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.widget-header{ background:var(--metal-bar); padding:8px 16px; display:flex;align-items:center;justify-content:space-between; }
.widget-header-title{font-family:'Cormorant Garamond', serif;font-size:0.76rem;font-weight:700;letter-spacing:0.22em;color:#6a2038;text-transform:uppercase;}
.w-dots{display:flex;gap:5px;}
.w-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.65);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9);}
.widget-body{padding:18px 18px 25px;}

/* ─── SETTINGS ─── */
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #fffcfd; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); }
.group-input { width: 45px; border: none; background: rgba(212,96,122,0.05); font-size: 0.55rem; color: var(--rg3); font-weight: 800; text-transform: uppercase; text-align: center; border-radius: 4px; padding: 2px 0; outline: none; }
.group-input:focus { background: var(--hover-metal); }
.menu-name-input { flex: 1; border: none; background: transparent; font-size: 0.75rem; outline: none; color: var(--text); font-weight: 500; }
.btn-del { background: none; border: none; color: #e8829a; cursor: pointer; font-size: 0.85rem; padding: 0 5px; opacity: 0.6; transition: opacity 0.2s; }
.btn-del:hover { opacity: 1; }
.btn-add-menu { width: 100%; padding: 10px; border: 1px dashed var(--rg3); border-radius: 8px; background: none; color: var(--rg2); font-size: 0.7rem; font-weight: 700; cursor: pointer; margin: 15px 0; transition: background 0.2s; }
.btn-add-menu:hover { background: var(--hover-metal); }
.settings-footer { margin-top: 20px; padding-bottom: 30px; display: flow-root; }

/* UI Elements */
.memo-area { width: 100%; height: 120px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #fff8fb; resize: none; outline: none; font-size: 0.8rem; font-family: inherit; color: var(--text); }
.save-btn { padding: 8px 18px; border: none; border-radius: 20px; background: var(--metal-bar); color: #6a2038; font-weight: 700; font-size: 0.7rem; cursor: pointer; margin-top: 10px; float: right; box-shadow: 0 2px 6px rgba(212,96,122,0.15); }
.brand-name{font-family:'Cormorant Garamond', serif;font-size:3rem;font-weight:700;color:var(--rg2);line-height:1;margin-bottom:14px;letter-spacing:0.08em;}
.tag-item{padding:9px 12px;border-radius:8px;background:rgba(252,232,239,0.8);border-left:3px solid var(--rg3);font-size:0.8rem;font-weight:800;color:var(--rg2);margin-bottom:7px;font-family:'Pretendard',sans-serif;}
.cal-month{font-family:'Cormorant Garamond', serif;font-size:1.6rem;font-weight:700;color:var(--rg2);text-align:center;margin-bottom:12px;}
.cal-table{width:100%;text-align:center;}
.cal-table th{font-size:0.59rem;color:var(--rg3);padding-bottom:7px;font-weight:800;}
.cal-table td{padding:6px 2px;font-size:0.82rem;color:rgba(61,26,36,0.75);font-family:'Pretendard',sans-serif;font-weight:600;}
.cal-today{background:var(--rg)!important;color:white!important;border-radius:50%;font-weight:800;}
.dday-wrap{text-align:center;}
.dday-num{font-family:'Cormorant Garamond', serif;font-size:4rem;font-weight:700;color:var(--rg2);line-height:1;}

/* ─── NOTE BOARD ─── */
.note-board-wrap {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* 상단: 게시물 목록 */
.note-list-box {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(212,96,122,0.08);
  animation: fadeUp .4s ease both;
}
.note-list-box-header {
  background: var(--metal-bar);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.note-list-box-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.76rem; font-weight: 700;
  letter-spacing: 0.22em; color: #6a2038; text-transform: uppercase;
}
.note-list-box-body { padding: 12px 14px; }
.note-list {
  display: flex; flex-direction: column; gap: 6px;
}
.note-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fffcfd;
  cursor: pointer;
  transition: all 0.2s;
}
.note-list-item:hover { background: var(--hover-metal); border-color: var(--rg3); }
.note-list-item.active { background: var(--hover-metal); border-left: 3px solid var(--rg); border-color: var(--rg); }
.note-list-item-title {
  font-size: 0.82rem; font-weight: 700; color: var(--text);
  font-family: 'Pretendard', sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.note-list-item-num {
  font-size: 0.7rem; font-weight: 800; color: var(--rg3);
  font-family: 'Pretendard', sans-serif;
  flex-shrink: 0; margin-right: 10px; min-width: 18px;
}
.note-list-item-date { font-size: 0.58rem; color: var(--text2); flex-shrink: 0; margin-left: 10px; }
.note-empty {
  text-align: center; padding: 22px 0;
  color: var(--rg3); font-size: 0.75rem; letter-spacing: 0.08em;
}

/* 하단 2열: 상세보기 + 작성칸 */
.note-bottom-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.note-detail-area { flex: 2; min-width: 0; }
.note-write-area { flex: 1; min-width: 0; }

/* 작성 박스 */
.note-write-box {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(212,96,122,0.08);
  animation: fadeUp .5s ease both;
}
.note-write-header {
  background: var(--metal-bar);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.note-write-header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.76rem; font-weight: 700;
  letter-spacing: 0.22em; color: #6a2038; text-transform: uppercase;
}
.note-write-body { padding: 16px; }
.note-title-input {
  width: 100%; border: none; border-bottom: 1px solid var(--border);
  background: transparent; font-size: 0.9rem; font-weight: 800;
  color: var(--text); font-family: 'Pretendard', sans-serif;
  padding: 6px 0 10px; margin-bottom: 12px; outline: none;
  letter-spacing: 0.04em;
}
.note-title-input::placeholder { color: var(--rg3); font-weight: 700; }
.note-content-input {
  width: 100%; min-height: 600px; border: 1px solid var(--border);
  border-radius: 10px; background: #fff8fb; padding: 12px;
  resize: vertical; outline: none; font-size: 0.85rem;
  font-family: 'Pretendard', sans-serif; font-weight: 600; color: var(--text);
  line-height: 1.8;
}
.note-write-footer {
  display: flex; justify-content: flex-end; margin-top: 10px;
}
.note-post-btn {
  padding: 8px 22px; border: none; border-radius: 20px;
  background: var(--metal-bar); color: #6a2038;
  font-weight: 700; font-size: 0.72rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(212,96,122,0.18);
  transition: opacity 0.2s;
}
.note-post-btn:hover { opacity: 0.85; }

/* 상세 카드 */
.note-detail-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 10px rgba(212,96,122,0.08);
  animation: fadeUp 0.4s ease both;
}
.note-detail-header {
  background: var(--metal-bar);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.note-detail-header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.76rem; font-weight: 700;
  letter-spacing: 0.22em; color: #6a2038; text-transform: uppercase;
}
.note-detail-body { padding: 20px; }
.note-detail-title {
  font-size: 1.05rem; font-weight: 800; color: var(--text);
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 5px; letter-spacing: 0.03em;
}
.note-detail-date { font-size: 0.62rem; color: var(--text2); margin-bottom: 14px; }
.note-detail-content {
  font-size: 0.86rem; color: var(--text2); line-height: 1.9;
  font-family: 'Pretendard', sans-serif; font-weight: 500;
  white-space: pre-wrap; word-break: break-all;
  border-top: 1px solid var(--border); padding-top: 14px;
}
.note-card-actions { display: flex; gap: 2px; }
.note-card-edit-btn {
  background: none; border: 1px solid var(--border); border-radius: 20px;
  color: var(--rg2); font-size: 0.68rem; cursor: pointer;
  padding: 3px 10px; font-weight: 700; font-family: 'Pretendard', sans-serif;
  transition: all 0.2s;
}
.note-card-edit-btn:hover { background: var(--hover-metal); }
.note-card-del {
  background: none; border: 1px solid rgba(212,96,122,0.3); border-radius: 20px;
  color: var(--rg2); font-size: 0.68rem; cursor: pointer;
  padding: 3px 10px; font-weight: 700; font-family: 'Pretendard', sans-serif;
  transition: all 0.2s;
}
.note-card-del:hover { background: rgba(212,96,122,0.1); }

/* 수정 모드 */
.note-edit-box {
  padding: 14px 16px 16px; background: rgba(252,232,239,0.25);
  border-top: 1px solid var(--border);
}
.note-edit-title {
  width: 100%; border: none; border-bottom: 1px solid var(--border);
  background: transparent; font-size: 0.9rem; font-weight: 700;
  color: var(--text); font-family: 'Pretendard', sans-serif;
  padding: 4px 0 8px; margin-bottom: 10px; outline: none;
}
.note-edit-content {
  width: 100%; min-height: 90px; border: 1px solid var(--border);
  border-radius: 10px; background: #fff8fb; padding: 10px;
  resize: none; outline: none; font-size: 0.78rem;
  font-family: 'Pretendard', sans-serif; color: var(--text); line-height: 1.7;
}
.note-edit-footer { display: flex; justify-content: flex-end; gap: 7px; margin-top: 10px; }
.note-edit-save {
  padding: 6px 18px; border: none; border-radius: 20px;
  background: var(--metal-bar); color: #6a2038;
  font-weight: 700; font-size: 0.68rem; cursor: pointer;
  box-shadow: 0 2px 6px rgba(212,96,122,0.15);
}
.note-edit-cancel {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--text2);
  font-weight: 600; font-size: 0.68rem; cursor: pointer;
}
.note-edit-cancel:hover { background: var(--hover-metal); }

/* 댓글 */
.note-detail-comment-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
.note-detail-comment-title {
  font-size: 0.68rem; font-weight: 800; color: var(--rg2);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
  font-family: 'Pretendard', sans-serif;
}
.note-detail-comment-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; border-bottom: 1px dashed rgba(212,96,122,0.1); font-size: 0.78rem;
}
.note-detail-comment-item:last-of-type { border-bottom: none; }
.note-detail-comment-text { color: var(--text2); flex: 1; line-height: 1.5; word-break: break-all; font-family: 'Pretendard', sans-serif; }
.note-detail-comment-del { background: none; border: none; color: var(--rg3); font-size: 0.65rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; flex-shrink: 0; }
.note-detail-comment-del:hover { opacity: 1; }
.note-detail-comment-write { display: flex; gap: 6px; margin-top: 10px; }
.note-detail-comment-input {
  flex: 1; border: 1px solid var(--border); border-radius: 20px;
  background: #fff8fb; padding: 6px 14px;
  font-size: 0.72rem; color: var(--text); outline: none;
  font-family: 'Pretendard', sans-serif;
}
.note-detail-comment-submit {
  padding: 6px 14px; border: none; border-radius: 20px;
  background: var(--metal-bar); color: #6a2038;
  font-weight: 700; font-size: 0.68rem; cursor: pointer;
  flex-shrink: 0; box-shadow: 0 1px 5px rgba(212,96,122,0.15);
}

/* 모바일 */
@media (max-width: 768px) {
  .note-bottom-wrap { flex-direction: column; }
}


/* MOBILE */
@media (max-width: 768px) {
  .site-wrap { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: fixed; top: 0; z-index: 200; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
  .sidebar-logo { padding: 10px 14px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
  nav { display: flex; flex-direction: row; overflow-x: auto; flex: 1; padding: 0 6px; scrollbar-width: none; }
  .nav-item { padding: 10px 12px; font-size: 0.72rem; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
  .nav-item:hover, .nav-item.active { border-bottom-color: var(--rg); border-left-color: transparent; }
  .bgm-widget { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; border-radius: 20px 20px 0 0; z-index: 200; }
  .bgm-body { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
  .record-scene { width: 50px; height: 50px; flex-shrink: 0; margin: 0; }
  .now-bar { bottom: 180px; right: 12px; }
  .main { padding: 70px 16px 220px; }
}
</style>
</head>
<body>
<div class="site-wrap">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">DOXX4E</div>
      <div class="logo-sub">Personal Space</div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-title">DOXX4E</div>
      <div class="main-date" id="main-date"></div>
    </div>
    <div class="widget-grid" id="main-content"></div>
  </main>
</div>

<div class="bgm-widget">
  <div class="bgm-header">
    <span class="bgm-header-title">♪ BGM Player</span>
    <div class="bgm-dots"><div class="bgm-dot"></div><div class="bgm-dot"></div></div>
  </div>
  <div class="bgm-body">
    <div class="record-scene">
      <div class="record-disc" id="record-disc">
        <div class="record-label"><img class="record-label-thumb" id="record-thumb" src="" alt=""></div>
        <div class="record-hole"></div>
      </div>
    </div>
    <div class="bgm-info">
      <div class="bgm-track-title" id="bgm-title">BGM Ready</div>
      <div class="bgm-track-channel" id="bgm-ch">YouTube</div>
    </div>
    <div class="bgm-controls">
      <button class="bgm-btn" id="btn-prev">◁</button>
      <button class="bgm-btn play-btn" id="btn-play">▷</button>
      <button class="bgm-btn" id="btn-next">▷|</button>
    </div>
  </div>
</div>
<div id="yt-player" style="position:fixed;bottom:-2px;left:-2px;width:1px;height:1px;opacity:0;pointer-events:none;"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ─── 데이터 관리 ───
let userMenus = JSON.parse(localStorage.getItem('userMenus')) || [
  {id: 'profile', name: '프로필', group: 'CHA.'},
  {id: 'relations', name: '관계란', group: 'CHA.'},
  {id: 'myroom', name: '마이룸', group: 'CHA.'},
  {id: 'log', name: '로그', group: 'LOG'},
  {id: 'gifts', name: '선물', group: 'LOG'},
  {id: 'talk', name: '떠들떠들', group: 'TALK'},
  {id: 'diary', name: '일기', group: 'TALK'},
  {id: 'cal', name: 'Cal.', group: 'TALK'},
  {id: 'note', name: '노트', group: 'ETC'},
  {id: 'guest', name: 'Guest', group: 'ETC'}
];
let memoContent = localStorage.getItem('memoContent') || '';

// ─── NOTE 데이터 ───
function getNotes() {
  return JSON.parse(localStorage.getItem('notesPosts')) || [];
}
function saveNotes(notes) {
  localStorage.setItem('notesPosts', JSON.stringify(notes));
}

// ─── Sidebar 렌더링 ───
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  let currentGroup = '';

  userMenus.forEach(menu => {
    if (menu.group !== currentGroup) {
      currentGroup = menu.group;
      const label = document.createElement('div');
      label.className = 'nav-group-label';
      label.textContent = currentGroup;
      nav.appendChild(label);
    }
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.textContent = menu.name;
    a.setAttribute('data-id', menu.id);
    a.onclick = () => loadPage(menu.id);
    nav.appendChild(a);
  });

  const settingsBtn = document.createElement('a');
  settingsBtn.className = 'nav-item';
  settingsBtn.style.color = 'var(--rg3)';
  settingsBtn.style.fontWeight = '700';
  settingsBtn.textContent = '⚙ 설정';
  settingsBtn.setAttribute('data-id', 'settings');
  settingsBtn.onclick = () => loadPage('settings');
  nav.appendChild(settingsBtn);
}

// ─── 페이지 로드 ───
function loadPage(pageId) {
  const content = document.getElementById('main-content');
  content.innerHTML = '';

  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.getAttribute('data-id') === pageId);
  });

  if(pageId === 'profile') renderHomeWidgets(content);
  else if(pageId === 'settings') renderSettings(content);
  else if(pageId === 'note') renderNotePage(content);
  else {
    const target = userMenus.find(m => m.id === pageId);
    content.innerHTML = `<div class="widget"><div class="widget-header"><span class="widget-header-title">Board</span></div><div class="widget-body">${target ? target.name : '페이지'} 준비 중입니다.</div></div>`;
  }
}

function renderHomeWidgets(container) {
  const diff = Math.floor((new Date() - new Date('2024-07-27')) / 864e5);
  container.innerHTML = `
    <div class="widget"><div class="widget-header"><span class="widget-header-title">Studio</span><div class="w-dots"><div class="w-dot"></div></div></div><div class="widget-body"><div class="brand-name">DOXX4E</div><div class="tag-item">✦ NEW PROJECT START</div><div class="tag-item">◈ PINK VIBE ONLY</div></div></div>
    <div class="widget"><div class="widget-header"><span class="widget-header-title">Memo</span><div class="w-dots"><div class="w-dot"></div></div></div><div class="widget-body"><textarea class="memo-area" id="memo-input" placeholder="메모하세요...">${memoContent}</textarea><button class="save-btn" onclick="saveMemo()">SAVE</button></div></div>
    <div class="widget"><div class="widget-header"><span class="widget-header-title">Calendar</span><div class="w-dots"><div class="w-dot"></div></div></div><div class="widget-body"><div class="cal-month" id="cal-month"></div><table class="cal-table"><thead><tr><th>SU</th><th>MO</th><th>TU</th><th>WE</th><th>TH</th><th>FR</th><th>SA</th></tr></thead><tbody id="cal-body"></tbody></table></div></div>
    <div class="widget"><div class="widget-header"><span class="widget-header-title">Days</span><div class="w-dots"><div class="w-dot"></div></div></div><div class="widget-body"><div class="dday-wrap"><div class="dday-label">Since Start</div><div class="dday-num">D+${diff}</div><div class="dday-since">2024 · 07 · 27</div></div></div></div>
  `;
  buildCal();
}

// ─── NOTE 페이지 렌더링 ───
let selectedNoteIdx = -1;

function renderNotePage(container) {
  container.innerHTML = `
    <div class="note-board-wrap">
      <!-- 상단: 작성하기 버튼 + 게시물 목록 -->
      <div class="note-list-box">
        <div class="note-list-box-header">
          <span class="note-list-box-title">✦ Posts</span>
          <button class="note-post-btn" onclick="toggleWriteBox()" id="write-toggle-btn">✦ 작성하기</button>
        </div>
        <!-- 작성 폼 (기본 숨김) -->
        <div id="note-write-collapse" style="display:none; border-top:1px solid var(--border);">
          <div class="note-write-body">
            <input type="text" class="note-title-input" id="note-title-input" placeholder="제목을 입력하세요" maxlength="60">
            <textarea class="note-content-input" id="note-content-input" placeholder="내용을 입력하세요..."></textarea>
            <div class="note-write-footer">
              <button class="note-edit-cancel" onclick="toggleWriteBox()">취소</button>
              <button class="note-post-btn" onclick="submitNote()">등록 ✦</button>
            </div>
          </div>
        </div>
        <div class="note-list-box-body">
          <div class="note-list" id="note-list"></div>
        </div>
      </div>
      <!-- 하단: 상세보기 -->
      <div id="note-detail-area"></div>
    </div>
  `;
  selectedNoteIdx = -1;
  renderNoteList();
}

function renderNoteList() {
  const list = document.getElementById('note-list');
  if (!list) return;
  const notes = getNotes();
  if (notes.length === 0) {
    list.innerHTML = `<div class="note-empty">✦ 아직 게시물이 없습니다 ✦</div>`;
    document.getElementById('note-detail-area').innerHTML = '';
    return;
  }
  list.innerHTML = '';
  notes.slice().reverse().forEach((note, revIdx) => {
    const realIdx = notes.length - 1 - revIdx;
    const num = revIdx + 1;
    const item = document.createElement('div');
    item.className = 'note-list-item' + (realIdx === selectedNoteIdx ? ' active' : '');
    item.innerHTML = `
      <span class="note-list-item-num">${num}</span>
      <span class="note-list-item-title">${escHtml(note.title)}</span>
      <span class="note-list-item-date">${note.date}</span>
    `;
    item.onclick = () => { selectedNoteIdx = realIdx; renderNoteList(); renderNoteDetail(realIdx); };
    list.appendChild(item);
  });
}

function renderNoteDetail(idx) {
  const area = document.getElementById('note-detail-area');
  if (!area) return;
  const notes = getNotes();
  if (idx < 0 || !notes[idx]) { area.innerHTML = ''; return; }
  const note = notes[idx];
  const comments = note.comments || [];
  const commentsHTML = comments.length > 0
    ? comments.map((c, ci) => `
        <div class="note-detail-comment-item">
          <span class="note-detail-comment-text">${escHtml(c.text)}</span>
          <button class="note-detail-comment-del" onclick="deleteComment(${idx},${ci})">✕</button>
        </div>`).join('')
    : `<div style="font-size:0.7rem;color:var(--rg3);padding:6px 0;">아직 댓글이 없습니다</div>`;
  area.innerHTML = `
    <div class="note-detail-card">
      <div class="note-detail-header">
        <span class="note-detail-header-title">✦ Note</span>
        <div class="note-card-actions">
          <button class="note-card-edit-btn" onclick="startEditNote(${idx})">✎ 수정</button>
          <button class="note-card-del" onclick="deleteNote(${idx})">✕ 삭제</button>
        </div>
      </div>
      <div class="note-detail-body">
        <div id="note-detail-view-${idx}">
          <div class="note-detail-title">${escHtml(note.title)}</div>
          <div class="note-detail-date">${note.date}</div>
          <div class="note-detail-content">${escHtml(note.content)}</div>
        </div>
        <div id="note-edit-area-${idx}"></div>
        <div class="note-detail-comment-section">
          <div class="note-detail-comment-title">Comments</div>
          <div id="detail-comment-list-${idx}">${commentsHTML}</div>
          <div class="note-detail-comment-write">
            <input type="text" class="note-detail-comment-input" id="ctext-${idx}" placeholder="댓글을 입력하세요" maxlength="100">
            <button class="note-detail-comment-submit" onclick="submitComment(${idx})">등록</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleWriteBox() {
  const box = document.getElementById('note-write-collapse');
  if (!box) return;
  const isOpen = box.style.display !== 'none';
  box.style.display = isOpen ? 'none' : 'block';
}

function submitNote() {
  const title = document.getElementById('note-title-input').value.trim();
  const content = document.getElementById('note-content-input').value.trim();
  if (!title && !content) return;
  const notes = getNotes();
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  notes.push({ title: title || '(제목 없음)', content, date: dateStr, comments: [] });
  saveNotes(notes);
  document.getElementById('note-title-input').value = '';
  document.getElementById('note-content-input').value = '';
  // 폼 닫기
  const box = document.getElementById('note-write-collapse');
  if (box) box.style.display = 'none';
  selectedNoteIdx = notes.length - 1;
  renderNoteList();
}

function startEditNote(idx) {
  const notes = getNotes();
  const note = notes[idx];
  const editArea = document.getElementById(`note-edit-area-${idx}`);
  const viewArea = document.getElementById(`note-detail-view-${idx}`);
  if (!editArea || editArea.innerHTML !== '') { cancelEditNote(idx); return; }
  viewArea.style.display = 'none';
  editArea.innerHTML = `
    <div class="note-edit-box">
      <input type="text" class="note-edit-title" id="edit-title-${idx}" value="${escHtml(note.title)}" maxlength="60">
      <textarea class="note-edit-content" id="edit-content-${idx}">${escHtml(note.content)}</textarea>
      <div class="note-edit-footer">
        <button class="note-edit-cancel" onclick="cancelEditNote(${idx})">취소</button>
        <button class="note-edit-save" onclick="saveEditNote(${idx})">저장하기 ✦</button>
      </div>
    </div>
  `;
}

function cancelEditNote(idx) {
  const editArea = document.getElementById(`note-edit-area-${idx}`);
  const viewArea = document.getElementById(`note-detail-view-${idx}`);
  if (editArea) editArea.innerHTML = '';
  if (viewArea) viewArea.style.display = '';
}

function saveEditNote(idx) {
  const newTitle = document.getElementById(`edit-title-${idx}`).value.trim();
  const newContent = document.getElementById(`edit-content-${idx}`).value.trim();
  const notes = getNotes();
  notes[idx].title = newTitle || '(제목 없음)';
  notes[idx].content = newContent;
  saveNotes(notes);
  renderNoteList();
  renderNoteDetail(idx);
}

function deleteNote(idx) {
  const notes = getNotes();
  notes.splice(idx, 1);
  saveNotes(notes);
  selectedNoteIdx = notes.length > 0 ? Math.min(idx, notes.length - 1) : -1;
  renderNoteList();
  renderNoteDetail(selectedNoteIdx);
}

function submitComment(noteIdx) {
  const textEl = document.getElementById(`ctext-${noteIdx}`);
  const text = textEl.value.trim();
  if (!text) return;
  const notes = getNotes();
  if (!notes[noteIdx].comments) notes[noteIdx].comments = [];
  notes[noteIdx].comments.push({ text });
  saveNotes(notes);
  renderNoteList();
  renderNoteDetail(noteIdx);
}

function deleteComment(noteIdx, commentIdx) {
  const notes = getNotes();
  notes[noteIdx].comments.splice(commentIdx, 1);
  saveNotes(notes);
  renderNoteList();
  renderNoteDetail(noteIdx);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Settings ───
function renderSettings(container) {
  container.innerHTML = `
    <div class="widget">
      <div class="widget-header"><span class="widget-header-title">Settings</span><div class="w-dots"><div class="w-dot"></div></div></div>
      <div class="widget-body">
        <p style="font-size:0.7rem; color:var(--rg2); margin-bottom:15px;">구분 카테고리와 메뉴 이름을 자유롭게 수정하세요.</p>
        <div id="edit-menu-list"></div>
        <button class="btn-add-menu" onclick="addNewMenuRow()">+ 새 메뉴 추가</button>
        <div class="settings-footer">
            <button class="save-btn" onclick="saveSettings()">설정 저장</button>
        </div>
      </div>
    </div>
  `;
  const list = document.getElementById('edit-menu-list');
  userMenus.forEach((menu, index) => {
    const row = document.createElement('div');
    row.className = 'setting-row';
    row.innerHTML = `
      <input type="text" class="group-input menu-group-edit" data-index="${index}" value="${menu.group}" placeholder="그룹">
      <input type="text" class="menu-name-input menu-name-edit" data-index="${index}" value="${menu.name}" placeholder="메뉴 이름">
      <button class="btn-del" onclick="removeMenuRow(${index})">✕</button>
    `;
    list.appendChild(row);
  });
}

function addNewMenuRow() {
  userMenus.push({ id: 'custom_' + Date.now(), name: '새 게시판', group: 'ETC' });
  renderSettings(document.getElementById('main-content'));
}

function removeMenuRow(index) {
  userMenus.splice(index, 1);
  renderSettings(document.getElementById('main-content'));
}

function saveSettings() {
  document.querySelectorAll('.menu-name-edit').forEach(input => {
    userMenus[input.dataset.index].name = input.value;
  });
  document.querySelectorAll('.menu-group-edit').forEach(input => {
    userMenus[input.dataset.index].group = input.value;
  });
  localStorage.setItem('userMenus', JSON.stringify(userMenus));
  renderSidebar();
  alert('설정이 저장되었습니다.');
}

function saveMemo() {
  memoContent = document.getElementById('memo-input').value;
  localStorage.setItem('memoContent', memoContent);
  alert('메모 저장 완료!');
}

function buildCal(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),today=n.getDate();
  const mEl = document.getElementById('cal-month'); if(!mEl) return;
  mEl.textContent=`${y}. ${String(m+1).padStart(2,'0')}`;
  const first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  const body=document.getElementById('cal-body'); body.innerHTML='';
  let d=1;
  for(let r=0;r<6;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const td=document.createElement('td');
      if(r===0&&c<first||d>last) td.textContent='';
      else{ td.textContent=d; if(d===today) td.classList.add('cal-today'); d++; }
      tr.appendChild(td);
    }
    body.appendChild(tr); if(d>last) break;
  }
}

// ─── BGM ───
let player = null, playerReady = false, tracks = [], cur = -1, playing = false;
function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt-player', { height:'1', width:'1', playerVars:{ autoplay:0 },
    events:{ onReady: () => { playerReady = true; loadFixedTracks(); }, onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) playNext(); } }
  });
}
async function loadFixedTracks(){
  const ids = ['EOEOe_2C6ZQ', 'QfIdY_Vl_vU'];
  for(const id of ids){
    try {
      const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      const d = await r.json(); tracks.push({ id, title: d.title, ch: d.author_name });
    } catch { tracks.push({ id, title: 'Music Track', ch: 'YouTube' }); }
  }
}
function playTrack(i){
  if(!playerReady || i<0 || i>=tracks.length) return;
  cur = i; const t = tracks[i]; player.loadVideoById(t.id); setPlaying(true);
  document.getElementById('bgm-title').textContent = t.title;
  document.getElementById('bgm-ch').textContent = t.ch;
}
function setPlaying(on) {
  playing = on;
  document.getElementById('btn-play').textContent = on ? '⏸' : '▷';
  const disc = document.getElementById('record-disc');
  if(on){ disc.classList.add('spinning'); }
  else { disc.classList.remove('spinning'); }
}
function playNext(){ if(tracks.length) playTrack((cur+1) % tracks.length); }
function playPrev(){ if(tracks.length) playTrack((cur-1+tracks.length) % tracks.length); }

document.getElementById('btn-play').onclick = () => {
  if(!playerReady || !tracks.length) return;
  if(playing){ player.pauseVideo(); setPlaying(false); }
  else { cur < 0 ? playTrack(0) : (player.playVideo(), setPlaying(true)); }
};
document.getElementById('btn-next').onclick = playNext;
document.getElementById('btn-prev').onclick = playPrev;

const now=new Date(), days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
document.getElementById('main-date').textContent = `${now.getFullYear()} · ${String(now.getMonth()+1).padStart(2,'0')} · ${String(now.getDate()).padStart(2,'0')} ${days[now.getDay()]}`;

renderSidebar();
loadPage('profile');
</script>
</body>
